<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>出游打包神器</title>

  <style>
    :root {
      --bg-page: #F7F9FC;
      --bg-card: #FFFFFF;
      --shadow-card: 0 4px 16px rgba(33, 65, 111, 0.06);
      --radius-card: 20px;
      --radius-btn: 16px;
      --radius-modal: 24px;
      --color-title: #21416F;
      --color-secondary: #8C9BB5;
      --color-placeholder: #A8B4C8;
      --color-accent: #6B93D6;
      --color-accent-hover: #5A82C4;
      --color-warm: #FFD86B;
      --color-border: #E6ECF5;
      --color-bg-soft: #F7F9FC;
      --font-ui: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
    }

    body {
      margin: 0;
      padding: 24px;
      padding-bottom: 100px;
      background: var(--bg-page);
      font-family: var(--font-ui);
    }

    .title {
      font-size: 32px;
      font-weight: 700;
      color: var(--color-title);
      margin-bottom: 20px;
      display: inline-block;
      max-width: 100%;
      cursor: pointer;
      user-select: none;
      -webkit-touch-callout: none;
      transition: color 0.2s ease;
    }

    .title.trip-title-placeholder {
      color: var(--color-placeholder);
      font-weight: 600;
    }

    .title:hover {
      color: var(--color-accent);
    }

    .title.trip-title-placeholder:hover {
      color: var(--color-secondary);
    }

    .members-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--color-title);
      display: inline-block;
      max-width: 100%;
      cursor: pointer;
      user-select: none;
      -webkit-touch-callout: none;
      transition: color 0.2s ease;
    }

    .members-title:hover {
      color: var(--color-accent);
    }

    .member-list {
      display: flex;
      flex-wrap: nowrap;
      align-items: flex-start;
      gap: 14px;
      overflow-x: auto;
      padding: 2px 0 6px;
      -webkit-overflow-scrolling: touch;
      position: relative;
    }

    .member-list::-webkit-scrollbar {
      display: none;
    }

    .member-chip {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
      padding: 2px;
      border: none;
      background: transparent;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }


    .member-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      font-size: 16px;
      font-weight: bold;
      border: 2px solid white;
      box-shadow: 0 2px 8px rgba(33, 65, 111, 0.08);
      flex-shrink: 0;
    }

    .member-chip-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--color-title);
      max-width: 56px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: center;
      line-height: 1.2;
    }

    .member-add-chip {
      justify-content: flex-start;
    }

    .member-add-chip .member-avatar {
      background: var(--bg-page);
      color: var(--color-accent);
      border: 1px dashed var(--color-border);
      box-shadow: none;
      font-size: 22px;
      font-weight: 400;
      line-height: 1;
    }

    .member-add-chip .member-chip-name {
      display: none;
    }

    .member-insert-indicator {
      position: absolute;
      top: 6px;
      bottom: 6px;
      width: 3px;
      border-radius: 2px;
      background: var(--color-accent);
      box-shadow: 0 0 0 2px rgba(107, 147, 214, 0.18);
      pointer-events: none;
      z-index: 6;
      display: none;
    }

    .member-list.is-reordering {
      overflow-x: hidden;
      touch-action: none;
      -webkit-overflow-scrolling: auto;
    }

    .member-list.is-reordering .member-chip {
      touch-action: none;
    }

    .member-chip.member-reorder-source {
      opacity: 0.35;
    }

    .member-reorder-float {
      position: fixed;
      z-index: 10001;
      pointer-events: none !important;
      transform: scale(1.08);
      box-shadow: 0 16px 36px rgba(33, 65, 111, 0.18);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .member-pending-list {
      list-style: none;
      margin: 0 0 12px;
      padding: 0;
      max-height: 50vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .member-pending-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--color-border);
      color: var(--color-title);
      font-size: 17px;
      line-height: 1.35;
    }

    .member-pending-item:last-child {
      border-bottom: none;
    }

    .member-pending-toggle {
      width: 26px;
      height: 26px;
      border: 1px solid var(--color-border);
      border-radius: 8px;
      background: var(--bg-card);
      color: var(--color-accent);
      font-size: 16px;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      touch-action: manipulation;
    }

    .member-pending-name {
      color: var(--color-title);
    }

    .member-pending-item.done .member-pending-name {
      color: #8C9BB5;
      text-decoration: line-through;
    }

    .member-pending-item.done .member-pending-toggle {
      border-color: var(--color-accent);
      background: var(--bg-page);
    }

    .member-pending-summary {
      text-align: center;
      margin: 0 0 12px;
    }

    .member-pending-percent {
      font-size: 16px;
      font-weight: 600;
      color: #8C9BB5;
      margin-bottom: 4px;
    }

    .member-pending-encourage {
      font-size: 13px;
      font-weight: 400;
      color: #8C9BB5;
    }

    .member-action-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 14px;
    }

    .member-action-btn {
      width: 100%;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-btn);
      padding: 12px 14px;
      font-size: 16px;
      font-weight: 600;
      text-align: left;
      cursor: pointer;
      background: var(--bg-page);
      color: var(--color-title);
      touch-action: manipulation;
      transition: all 0.2s ease;
    }

    .member-action-btn-danger {
      background: #fef2f2;
      border-color: #fecaca;
      color: #dc2626;
    }

    .member-empty {
      font-size: 14px;
      color: var(--color-secondary);
      padding: 8px 4px;
    }

    .card {
      background: var(--bg-card);
      border-radius: var(--radius-card);
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: var(--shadow-card);
      transition: box-shadow 0.2s ease;
    }

    .category {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 15px;
      color: var(--color-title);
    }

    .checklist-category-card .category-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 15px;
      pointer-events: none;
    }

    .checklist-category-card .category-card-header .category-name {
      margin-bottom: 0;
    }

    .category-header-start {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
      max-width: calc(100% - 72px);
      min-width: 0;
      position: relative;
      z-index: 4;
      pointer-events: auto;
    }

    .category-header-start .category-name,
    .category-header-start .category-add {
      pointer-events: auto;
    }

    .category-name {
      flex: 1 1 auto;
      min-width: 0;
      max-width: min(52vw, 260px);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      padding: 4px 2px;
      border-radius: 8px;
    }

    .category-name:hover {
      color: var(--color-accent);
      background: var(--bg-page);
    }

    .category-drag-handle {
      position: relative;
      z-index: 0;
      flex: 1 1 0;
      min-width: 24px;
      height: 32px;
      align-self: center;
      margin: 0 6px;
      border-radius: 4px;
      background: transparent;
      cursor: grab;
      pointer-events: auto;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    .category-drag-handle:active,
    .checklist-category-card.category-reorder-active .category-drag-handle {
      cursor: grabbing;
    }

    #categoriesContainer {
      position: relative;
    }

    .category-insert-indicator {
      position: absolute;
      left: 12px;
      right: 12px;
      height: 3px;
      margin-top: -2px;
      border-radius: 2px;
      background: var(--color-accent);
      box-shadow: 0 0 0 2px rgba(107, 147, 214, 0.18);
      pointer-events: none;
      z-index: 6;
    }

    .checklist-category-card.category-reorder-source {
      opacity: 0.32;
    }

    .checklist-category-card.category-reorder-active {
      box-shadow: 0 6px 16px rgba(59, 130, 246, 0.14);
    }

    .category-reorder-float {
      position: fixed;
      z-index: 10000;
      margin: 0;
      pointer-events: none !important;
      box-shadow: 0 16px 40px rgba(59, 130, 246, 0.22);
      opacity: 0.98;
    }

    .category-reorder-float * {
      pointer-events: none !important;
    }

    .category-add {
      position: relative;
      z-index: 3;
      flex-shrink: 0;
      box-sizing: border-box;
      width: 34px;
      height: 34px;
      padding: 3px;
      margin: 0;
      margin-left: 4px;
      border: none;
      border-radius: 50%;
      background: rgba(255, 216, 107, 0.35);
      background-clip: content-box;
      color: var(--color-accent);
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    .category-add:hover {
      background: rgba(255, 216, 107, 0.55);
    }

    .category-progress {
      flex-shrink: 0;
      min-width: 2.75em;
      margin-left: 4px;
      font-size: 14px;
      font-weight: 500;
      color: var(--color-secondary);
      font-variant-numeric: tabular-nums;
      line-height: 1;
      text-align: right;
      pointer-events: none;
      user-select: none;
      -webkit-user-select: none;
    }

    .checklist-category-card.collapsed .item {
      display: none;
    }

    @media (max-width: 768px), (hover: none) and (pointer: coarse) {
      .category-header-start {
        gap: 6px;
      }

      .category-add {
        width: 34px;
        height: 34px;
        padding: 3px;
        margin-left: 4px;
      }

      .category-drag-handle {
        min-width: 16px;
        margin-left: 8px;
        margin-right: 8px;
        height: 32px;
      }
    }

    .item {
      display: flex;
      align-items: center;
      margin-bottom: 14px;
    }

    .item-name {
      margin-left: 10px;
      font-size: 18px;
      color: #ef4444;
      transition: 0.3s;
      display: inline-block;
      flex: 0 1 auto;
      min-width: 0;
      max-width: 45%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      cursor: pointer;
    }

    .item.completed .item-name {
      color: var(--color-accent);
    }

    .item-name:hover {
      text-decoration: underline;
    }

    .avatars {
      margin-left: auto;
      display: flex;
      flex-wrap: nowrap;
      align-items: center;
      justify-content: flex-end;
      flex-shrink: 0;
    }

    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--color-warm);
      margin-left: -8px;
      border: 2px solid white;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      font-size: 12px;
      font-weight: bold;
      flex-shrink: 0;
      box-sizing: border-box;
    }

    .avatars > .avatar:first-child {
      margin-left: 0;
    }

    .avatar-more {
      background: var(--color-border);
      color: var(--color-accent);
      font-size: 11px;
      font-weight: 700;
    }

    .avatars .avatar:not(.avatar-more) {
      cursor: pointer;
    }

    .item-delete {
      width: 28px;
      height: 28px;
      margin-left: 10px;
      border: none;
      border-radius: 50%;
      background: #fee2e2;
      color: #f87171;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .item-delete:hover {
      background: #fecaca;
      color: #ef4444;
    }

    .add-button {
      position: fixed;
      right: 16px;
      bottom: calc(16px + env(safe-area-inset-bottom, 0px));
      width: 56px;
      height: 56px;
      border: none;
      border-radius: 50%;
      background: #6B93D6;
      color: #ffffff;
      font-size: 30px;
      font-weight: 300;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(107,147,214,0.25);
      transition: all 0.2s ease;
      z-index: 90;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .add-button:active {
      transform: scale(0.95);
    }

    .invite-hint-intro {
      margin: 0 0 10px;
      color: var(--color-secondary);
      font-size: 15px;
      line-height: 1.5;
    }

    .invite-hint-list {
      margin: 0 0 18px;
      padding-left: 20px;
      color: var(--color-title);
      font-size: 15px;
      line-height: 1.7;
    }

    .invite-hint-list li {
      margin-bottom: 4px;
    }

    .invite-modal-actions {
      display: flex;
      justify-content: center;
    }

    .invite-modal-actions .modal-btn {
      min-width: 120px;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(33, 65, 111, 0.22);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
    }

    #addCategoryModal {
      z-index: 101;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal {
      width: 100%;
      max-width: 360px;
      background: var(--bg-card);
      border-radius: var(--radius-modal);
      padding: 20px;
      box-shadow: var(--shadow-card);
    }

    .modal h3 {
      margin: 0 0 14px;
      color: var(--color-title);
      font-size: 20px;
      font-weight: 700;
    }

    .modal label {
      display: block;
      margin-bottom: 6px;
      color: var(--color-title);
      font-weight: 600;
      font-size: 14px;
    }

    .modal input,
    .modal select {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-btn);
      padding: 10px 12px;
      font-size: 16px;
      margin-bottom: 12px;
      background: var(--bg-page);
      color: var(--color-title);
      outline: none;
      transition: all 0.2s ease;
    }

    .modal input:focus,
    .modal select:focus {
      border-color: var(--color-accent);
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 4px;
    }

    .owner-options {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }

    .owner-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--bg-page);
      border: 1px solid var(--color-border);
      border-radius: 999px;
      padding: 6px 10px;
      color: var(--color-title);
      font-size: 13px;
      cursor: pointer;
    }

    .owner-chip input {
      margin: 0;
      width: 14px;
      height: 14px;
      accent-color: var(--color-accent);
    }

    .owner-chip-avatar {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      font-size: 11px;
      font-weight: bold;
      border: 2px solid white;
      flex-shrink: 0;
    }

    .owner-chip-all .owner-chip-avatar {
      background: var(--color-border);
      font-size: 12px;
      font-weight: normal;
      line-height: 1;
    }

    .modal-btn {
      border: none;
      border-radius: var(--radius-btn);
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .modal-btn.cancel {
      background: var(--bg-page);
      color: var(--color-secondary);
      border: 1px solid var(--color-border);
    }

    .modal-btn.confirm {
      background: var(--color-accent);
      color: #ffffff;
    }

    .modal-btn.danger {
      background: #fca5a5;
      color: #ffffff;
    }

    .modal-btn.danger:hover {
      background: #f87171;
    }

    .confirm-delete-message {
      margin: 0 0 16px;
      color: var(--color-secondary);
      font-size: 15px;
      line-height: 1.5;
    }

    #confirmDeleteModal {
      z-index: 102;
    }

    .add-category-footer {
      margin-bottom: 20px;
      padding: 0 2px;
    }

    .add-category-btn {
      width: 100%;
      border: 1px dashed var(--color-border);
      border-radius: var(--radius-btn);
      padding: 12px 14px;
      background: transparent;
      color: var(--color-secondary);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .add-category-btn:hover {
      background: var(--bg-page);
      border-color: var(--color-accent);
      color: var(--color-accent);
    }

    #homePage[hidden],
    #travelPage[hidden],
    #memberManagePage[hidden],
    #editTravelInfoPage[hidden],
    #addItemPage[hidden],
    #changeCoverPage[hidden] {
      display: none !important;
    }

    #homePage {
      max-width: 520px;
      margin: 0 -24px;
      padding: 0 24px 32px;
      background: var(--bg-page);
      min-height: 100vh;
    }

    #travelPage {
      padding-bottom: calc(96px + env(safe-area-inset-bottom, 0px));
    }

    .home-hero {
      position: relative;
      margin: -24px -24px 24px;
      padding: 28px 24px 32px;
      background: linear-gradient(180deg, #FFF9E8 0%, #FDFCF8 55%, var(--bg-page) 100%);
      border-radius: 0 0 28px 28px;
      overflow: hidden;
    }

    .home-hero::before {
      content: '';
      position: absolute;
      right: -20px;
      top: 18px;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 216, 107, 0.45) 0%, rgba(255, 216, 107, 0) 70%);
      pointer-events: none;
    }

    .home-hero::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 48px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0) 0%, #ffffff 100%);
      pointer-events: none;
    }

    .home-brand {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .home-app-icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(145deg, var(--color-accent) 0%, #5A82C4 100%);
      box-shadow: var(--shadow-card);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 26px;
      line-height: 1;
    }

    .home-page-title {
      margin: 0 0 6px;
      font-size: 28px;
      font-weight: 700;
      color: var(--color-title);
      letter-spacing: 0.02em;
      line-height: 1.2;
    }

    .home-page-subtitle {
      margin: 0;
      font-size: 14px;
      color: var(--color-secondary);
      line-height: 1.45;
    }

    .home-actions {
      display: flex;
      gap: 14px;
      margin-bottom: 24px;
    }

    .home-action-btn {
      flex: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 54px;
      padding: 14px 16px;
      border: none;
      border-radius: var(--radius-btn);
      background: var(--color-accent);
      color: #ffffff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      box-shadow: var(--shadow-card);
      touch-action: manipulation;
      transition: all 0.2s ease;
    }

    .home-action-btn:hover {
      background: var(--color-accent-hover);
      box-shadow: 0 6px 20px rgba(33, 65, 111, 0.1);
    }

    .home-action-btn:active {
      transform: scale(0.98);
    }

    .home-action-icon {
      font-size: 18px;
      font-weight: 700;
      line-height: 1;
    }

    #travelsContainer {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    #travelsContainer .card.travel-card {
      margin-bottom: 0;
    }

    .travel-insert-indicator {
      position: absolute;
      left: 8px;
      right: 8px;
      height: 3px;

    .cover-tile {

    .cover-tile-overlay {

    function iconForCategoryName(name) {
      const s = String(name || '').trim();
      if (!s) return '📦';
      if (CATEGORY_ICONS[s]) return CATEGORY_ICONS[s];
      for (let i = 0; i < CATEGORY_ICON_KEYWORD_RULES.length; i++) {
        const rule = CATEGORY_ICON_KEYWORD_RULES[i];
        for (let j = 0; j < rule.keys.length; j++) {
          if (s.includes(rule.keys[j])) return rule.icon;
        }
      }
      return '📦';
    }

      '#FFD86B', '#F5C96A', '#6B93D6', '#8C9BB5',

    function bindUiLongPress(element, handlers) {
      if (!element || !handlers || typeof handlers.onLongPress !== 'function') return;
      let pressTimer = null;
      let pressStart = null;
      let longPressTriggered = false;

      function clearPressTimer() {
        if (pressTimer) {
          clearTimeout(pressTimer);
          pressTimer = null;
        }
      }

      element.addEventListener('pointerdown', (event) => {
        if (event.button !== 0 && event.pointerType === 'mouse') return;
        if (typeof handlers.onPointerDown === 'function') {
          handlers.onPointerDown(event);
        }
        longPressTriggered = false;
        pressStart = { x: event.clientX, y: event.clientY };
        clearPressTimer();
        pressTimer = window.setTimeout(() => {
          longPressTriggered = true;
          handlers.onLongPress(event);
          clearPressTimer();
          pressStart = null;
        }, UI_LONG_PRESS_MS);
      });

      element.addEventListener('pointermove', (event) => {
        if (!pressTimer || !pressStart) return;
        const dx = Math.abs(event.clientX - pressStart.x);
        const dy = Math.abs(event.clientY - pressStart.y);
        if (dx > UI_LONG_PRESS_MOVE_CANCEL_PX || dy > UI_LONG_PRESS_MOVE_CANCEL_PX) {
          clearPressTimer();
          pressStart = null;
        }
      });

      const endPress = () => {
        clearPressTimer();
        pressStart = null;
      };
      element.addEventListener('pointerup', endPress);
      element.addEventListener('pointercancel', endPress);

      if (typeof handlers.onTap === 'function') {
        element.addEventListener('click', (event) => {
          if (longPressTriggered) {
            longPressTriggered = false;
            return;
          }
          handlers.onTap(event);
        });
      }
    }

      let h = 0;
      const s = String(name);
      for (let i = 0; i < s.length; i++) {

      }
      return AVATAR_PALETTE[Math.abs(h) % AVATAR_PALETTE.length];
    }

      travel.collapsedCategories = { ...collapsedCategories };
    }

    function syncTravelToGlobals(travel) {
      if (!travel) return;
      tripTitle = travel.name || '';
      membersSectionTitle = travel.membersSectionTitle || DEFAULT_MEMBERS_SECTION_TITLE;
      members = Array.isArray(travel.members) ? travel.members.map(m => ({
        id: m.id || createId(),
        name: String(m.name || '').trim(),
        avatarUrl: (typeof m.avatarUrl === 'string') ? m.avatarUrl.trim() : ''
      })).filter(m => m.name) : [];
      categories = Array.isArray(travel.categories)
        ? [...new Set(travel.categories.map(s => String(s).trim()).filter(Boolean))]
        : [];
      checklistItems = Array.isArray(travel.items) ? travel.items : [];
      checklistItems.forEach(normalizeItemCompletion);
      collapsedCategories = {};
      if (travel.collapsedCategories && typeof travel.collapsedCategories === 'object') {
        Object.keys(travel.collapsedCategories).forEach(cat => {
          if (travel.collapsedCategories[cat]) collapsedCategories[cat] = true;
        });
      }
    }

    function saveTravels() {
      localStorage.setItem(TRAVELS_STORAGE_KEY, JSON.stringify(travels));
    }

    function saveChecklistItems() {
      syncGlobalsToCurrentTravel();
      saveTravels();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(checklistItems));
    }

    function saveMembers() {
      syncGlobalsToCurrentTravel();
      saveTravels();
      localStorage.setItem(MEMBERS_STORAGE_KEY, JSON.stringify(members));
    }

    function isTripTitleUnset() {
      return !String(tripTitle || '').trim();
    }

    function isLegacyDefaultTripTitle(name) {
      return LEGACY_DEFAULT_TRIP_TITLES.includes(String(name || '').trim());
    }

    function getDisplayTripTitle() {
      return isTripTitleUnset() ? TRIP_TITLE_PLACEHOLDER : tripTitle.trim();
    }

    function saveTripTitle() {
      syncGlobalsToCurrentTravel();
      saveTravels();
      localStorage.setItem(TRIP_TITLE_STORAGE_KEY, tripTitle.trim());
    }

    function loadTripTitle() {
      try {
        const raw = localStorage.getItem(TRIP_TITLE_STORAGE_KEY);
        if (raw !== null && raw !== undefined) {
          const name = String(raw).trim();
          if (name && !isLegacyDefaultTripTitle(name) && name !== TRIP_TITLE_PLACEHOLDER) {
            tripTitle = name;
            return;
          }
        }
      } catch (e) {
        tripTitle = '';
      }
      tripTitle = '';
    }

    function getTravelMembersLine(travel) {
      const list = Array.isArray(travel.members) ? travel.members : [];
      const friends = list.filter(m => m.name !== '我').length;
      if (friends <= 0) return '独自出发 ✈️';
      return `与 ${friends} 位朋友一起`;
    }

    function renderTripTitle() {
      const currentTravel = getCurrentTravel();
      const unset = isTripTitleUnset();
      tripTitleEl.textContent = getDisplayTripTitle();
      tripTitleEl.classList.toggle('trip-title-placeholder', unset);
      tripDateDisplayEl.textContent = currentTravel ? formatTravelDateRange(currentTravel) : '未设置日期';
      if (tripHeroEl) {
        tripHeroEl.style.backgroundImage = currentTravel ? getTravelCoverBackground(currentTravel) : '';
      }
      if (tripMembersLineEl) {
        tripMembersLineEl.textContent = currentTravel ? getTravelMembersLine(currentTravel) : '';
      }
      document.title = unset ? '旅行清单' : tripTitle.trim();
    }

    function toDotDateLabel(isoDate) {
      const raw = String(isoDate || '').trim();
      if (!raw) return '';
      const parts = raw.split('-');
      if (parts.length === 3) {
        const y = parts[0];
        const m = String(Number(parts[1]) || '').padStart(2, '0');
        const d = String(Number(parts[2]) || '').padStart(2, '0');
        if (y && m !== '00' && d !== '00') return `${y}.${m}.${d}`;
      }
      const parsed = new Date(raw);
      if (!Number.isNaN(parsed.getTime())) {
        const y = parsed.getFullYear();
        const m = String(parsed.getMonth() + 1).padStart(2, '0');
        const d = String(parsed.getDate()).padStart(2, '0');
        return `${y}.${m}.${d}`;
      }
      return raw;
    }

    function saveMembersSectionTitle() {
      syncGlobalsToCurrentTravel();
      saveTravels();
      localStorage.setItem(MEMBERS_SECTION_TITLE_STORAGE_KEY, membersSectionTitle);
    }

    function loadMembersSectionTitle() {
      try {
        const raw = localStorage.getItem(MEMBERS_SECTION_TITLE_STORAGE_KEY);
        if (raw) {
          const name = String(raw).trim();
          if (name && !isLegacyDefaultMembersSectionTitle(name)) {
            membersSectionTitle = name;
            return;
          }
        }
      } catch (e) {
        membersSectionTitle = DEFAULT_MEMBERS_SECTION_TITLE;
      }
      membersSectionTitle = DEFAULT_MEMBERS_SECTION_TITLE;
      saveMembersSectionTitle();
    }

    function renderMembersSectionTitle() {
      membersSectionTitleEl.textContent = membersSectionTitle;
    }

    function openEditMembersSectionTitleModal() {
      editMembersSectionTitleInput.value = membersSectionTitle;
      editMembersSectionTitleModal.classList.add('show');
      editMembersSectionTitleInput.focus();
      editMembersSectionTitleInput.select();
    }

    function closeEditMembersSectionTitleModal() {
      editMembersSectionTitleModal.classList.remove('show');
    }

    function saveEditedMembersSectionTitle() {
      const nextTitle = editMembersSectionTitleInput.value.trim();
      if (!nextTitle) {
        editMembersSectionTitleInput.focus();
        return;
      }
      if (nextTitle !== membersSectionTitle) {
        membersSectionTitle = nextTitle;
        saveMembersSectionTitle();
        renderMembersSectionTitle();
      }
      closeEditMembersSectionTitleModal();
    }

    function openEditCategoryModal(oldName) {
      if (!categories.includes(oldName)) return;
      editingCategoryOldName = oldName;
      editCategoryNameInput.value = oldName;
      editCategoryModal.classList.add('show');
      editCategoryNameInput.focus();
      editCategoryNameInput.select();
    }

    function closeEditCategoryModal() {
      editCategoryModal.classList.remove('show');
      editingCategoryOldName = null;
    }

    function saveEditedCategory() {
      if (!editingCategoryOldName) return;
      const oldName = editingCategoryOldName;
      const nextName = editCategoryNameInput.value.trim();
      if (!nextName) {
        editCategoryNameInput.focus();
        return;
      }
      if (nextName !== oldName && categories.includes(nextName)) {
        editCategoryNameInput.select();
        return;
      }
      if (nextName === oldName) {
        closeEditCategoryModal();
        return;
      }
      const idx = categories.indexOf(oldName);
      if (idx === -1) return;

      categories[idx] = nextName;
      checklistItems.forEach(item => {
        if (item.category === oldName) item.category = nextName;
      });

      if (collapsedCategories[oldName]) {
        collapsedCategories[nextName] = true;
      }
      delete collapsedCategories[oldName];

      if (addItemTargetCategory === oldName) {
        addItemTargetCategory = nextName;
      }

      if (quickAddTargetCategory === oldName) {
        quickAddTargetCategory = nextName;
      }

      saveCategories();
      saveChecklistItems();
      saveCategoryCollapseState();

      const prevSelect = categorySelect.value === oldName ? nextName : categorySelect.value;
      renderCategoryCards();
      syncCategorySelect(prevSelect);
      renderChecklistItems();
      closeEditCategoryModal();
    }

    function saveCategories() {
      syncGlobalsToCurrentTravel();
      saveTravels();
      localStorage.setItem(CATEGORIES_STORAGE_KEY, JSON.stringify(categories));
    }

    function saveCategoryCollapseState() {
      syncGlobalsToCurrentTravel();
      saveTravels();
      localStorage.setItem(CATEGORY_COLLAPSE_STORAGE_KEY, JSON.stringify(collapsedCategories));
    }

    function loadCategoryCollapseState() {
      try {
        const raw = localStorage.getItem(CATEGORY_COLLAPSE_STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : {};
        collapsedCategories = {};
        if (parsed && typeof parsed === 'object' && !Array.isArray(parsed)) {
          Object.keys(parsed).forEach(cat => {
            if (parsed[cat]) collapsedCategories[cat] = true;
          });
        }
      } catch (e) {
        collapsedCategories = {};
      }
    }

    function applyCategoryCollapseState(card, cat) {
      const collapsed = !!collapsedCategories[cat];
      card.classList.toggle('collapsed', collapsed);
      const label = card.querySelector('.category-name');
      if (label) {
        label.textContent = categoryHeading(cat);
        label.setAttribute('aria-expanded', String(!collapsed));
      }
    }

    function getCategoryItemProgress(cat) {
      const items = checklistItems.filter(item => item.category === cat);
      const total = items.length;
      const completed = items.filter(item => isItemAllOwnersComplete(item)).length;
      return { completed, total };
    }

    function formatCategoryProgress(cat) {
      const { completed, total } = getCategoryItemProgress(cat);
      return `${completed}/${total}`;
    }

    function updateCategoryProgressDisplay(cat) {
      const card = categoryCards[cat];
      if (!card) return;
      const progressEl = card.querySelector('.category-progress');
      if (!progressEl) return;
      const { completed, total } = getCategoryItemProgress(cat);
      progressEl.textContent = `${completed}/${total}`;
      progressEl.setAttribute('aria-label', `已完成 ${completed}，共 ${total}`);
    }

    function updateAllCategoryProgressDisplays() {
      categories.forEach(updateCategoryProgressDisplay);
    }

    function openCategoryActionModal(catName) {
      if (!catName) return;
      categoryActionTargetName = catName;
      categoryActionTitle.textContent = categoryHeading(catName);
      categoryActionDeleteBtn.disabled = categories.length <= 1;
      categoryActionModal.classList.add('show');
    }

    function closeCategoryActionModal() {
      categoryActionTargetName = null;
      categoryActionModal.classList.remove('show');
    }

    function toggleCategoryCollapse(cat) {
      if (!cat) return;
      collapsedCategories[cat] = !collapsedCategories[cat];
      if (!collapsedCategories[cat]) delete collapsedCategories[cat];
      saveCategoryCollapseState();
      const card = categoryCards[cat];
      if (card) applyCategoryCollapseState(card, cat);
    }

    function bindCategoryHeaderControl(el, handler) {
      if (!el) return;
      let lastInvokeAt = 0;
      const invoke = (event) => {
        event.stopPropagation();
        const now = Date.now();
        if (now - lastInvokeAt < 400) return;
        lastInvokeAt = now;
        handler(event);
      };
      const stopDragPointerBubble = (event) => {
        categoryListReorder.cancelPending();
        event.stopPropagation();
      };
      el.addEventListener('touchstart', stopDragPointerBubble, { capture: true, passive: true });
      el.addEventListener('pointerdown', stopDragPointerBubble, { capture: true });
      el.addEventListener('pointerup', (event) => {
        if (event.pointerType === 'mouse' && event.button !== 0) return;
        invoke(event);
      });
      el.addEventListener('click', invoke);
    }

    function openConfirmDelete(onConfirm, copyKey = 'default') {
      const copy = DELETE_COPY[copyKey] || DELETE_COPY.default;
      confirmDeleteTitle.textContent = copy.title;
      if (copy.message) {
        confirmDeleteMessage.textContent = copy.message;
        confirmDeleteMessage.hidden = false;
      } else {
        confirmDeleteMessage.textContent = '';
        confirmDeleteMessage.hidden = true;
      }
      pendingDeleteAction = onConfirm;
      confirmDeleteModal.classList.add('show');
    }

    function openConfirmDeleteMember(memberId) {
      openConfirmDelete(() => removeMemberById(memberId), 'member');
    }

    function closeConfirmDelete() {
      pendingDeleteAction = null;
      confirmDeleteModal.classList.remove('show');
    }

    function executeConfirmDelete() {
      if (typeof pendingDeleteAction === 'function') {
        pendingDeleteAction();
      }
      closeConfirmDelete();
    }

    function removeItemById(itemId) {
      checklistItems = checklistItems.filter(entry => entry.id !== itemId);
      saveChecklistItems();
      renderChecklistItems();
    }

    function loadCategories() {
      try {
        const raw = localStorage.getItem(CATEGORIES_STORAGE_KEY);
        if (raw) {
          const parsed = JSON.parse(raw);
          if (Array.isArray(parsed) && parsed.length) {
            categories = [...new Set(parsed.map(s => String(s).trim()).filter(Boolean))];
            return;
          }
        }
      } catch (e) {
        categories = [];
      }
      categories = [...DEFAULT_CATEGORY_ORDER];
      saveCategories();
    }

    function renderCategoryCards() {
      categoriesContainer.innerHTML = '';
      Object.keys(categoryCards).forEach(k => {
        delete categoryCards[k];
      });
      categories.forEach(cat => {
        const card = document.createElement('div');
        card.className = 'card checklist-category-card';
        card.dataset.categoryName = cat;

        const header = document.createElement('div');
        header.className = 'category-card-header';
        const nameSpan = document.createElement('span');
        nameSpan.className = 'category category-name';
        nameSpan.dataset.categoryName = cat;
        nameSpan.setAttribute('role', 'button');
        nameSpan.setAttribute('tabindex', '0');
        nameSpan.setAttribute('title', '点击展开或收起；长按更多操作');
        nameSpan.setAttribute('aria-label', '展开或收起分类');
        const addItemBtn = document.createElement('button');
        addItemBtn.type = 'button';
        addItemBtn.className = 'category-add';
        addItemBtn.dataset.categoryName = cat;
        addItemBtn.setAttribute('aria-label', `添加物品到${cat}`);
        addItemBtn.textContent = '＋';
        const dragHandle = document.createElement('div');
        dragHandle.className = 'category-drag-handle';
        dragHandle.setAttribute('aria-hidden', 'true');
        dragHandle.title = '长按拖动排序';
        const headerStart = document.createElement('div');
        headerStart.className = 'category-header-start';
        const progressEl = document.createElement('span');
        progressEl.className = 'category-progress';
        progressEl.setAttribute('aria-hidden', 'true');

        headerStart.appendChild(nameSpan);
        headerStart.appendChild(addItemBtn);
        header.appendChild(headerStart);
        header.appendChild(dragHandle);
        header.appendChild(progressEl);

        bindCategoryHeaderControl(addItemBtn, () => openQuickAddItemModal(cat));
        bindUiLongPress(nameSpan, {
          onPointerDown: (event) => {
            categoryListReorder.cancelPending();
            event.stopPropagation();
          },
          onTap: () => toggleCategoryCollapse(cat),
          onLongPress: () => openCategoryActionModal(cat)
        });
        card.appendChild(header);
        applyCategoryCollapseState(card, cat);

        categoriesContainer.appendChild(card);
        categoryCards[cat] = card;
        updateCategoryProgressDisplay(cat);
      });
      categoryListReorder.bindHandles();
    }

    const CATEGORY_REORDER_LONG_PRESS_MS = 500;
    const CATEGORY_REORDER_MOVE_THRESHOLD = 12;
    const CATEGORY_REORDER_EDGE_ZONE = 56;
    const CATEGORY_REORDER_SCROLL_STEP = 12;

    const categoryListReorder = (function () {
      let session = null;
      let insertIndicator = null;
      let scrollRaf = null;
      let savedBodyOverflow = null;
      let savedScrollY = 0;
      let endListenersAttached = false;

      function getCategoryCards() {
        return [...categoriesContainer.querySelectorAll('.checklist-category-card')];
      }

      function findInsertIndex(clientY, sourceCard) {
        const cards = getCategoryCards();
        for (let i = 0; i < cards.length; i++) {
          const card = cards[i];
          if (card === sourceCard) continue;
          const rect = card.getBoundingClientRect();
          if (clientY < rect.top + rect.height / 2) return i;
        }
        return cards.length;
      }

      function updateInsertIndicator(insertIndex) {
        if (!insertIndicator) return;
        const cards = getCategoryCards();
        if (!cards.length) {
          insertIndicator.hidden = true;
          return;
        }
        let top;
        if (insertIndex <= 0) {
          top = cards[0].offsetTop;
        } else if (insertIndex >= cards.length) {
          const last = cards[cards.length - 1];
          top = last.offsetTop + last.offsetHeight;
        } else {
          top = cards[insertIndex].offsetTop;
        }
        insertIndicator.style.top = `${top}px`;
        insertIndicator.hidden = false;
        insertIndicator.style.display = 'block';
      }

      function lockPageScroll() {
        if (savedBodyOverflow == null) {
          savedBodyOverflow = document.body.style.overflow;
        }
        document.body.style.overflow = 'hidden';
      }

      function forceUnlockPageScroll() {
        document.body.style.overflow = savedBodyOverflow || '';
        savedBodyOverflow = null;
      }

      function stopEdgeScrollLoop() {
        if (scrollRaf) {
          cancelAnimationFrame(scrollRaf);
          scrollRaf = null;
        }
      }

      function edgeScroll(clientY) {
        if (clientY < CATEGORY_REORDER_EDGE_ZONE) {
          window.scrollBy(0, -CATEGORY_REORDER_SCROLL_STEP);
        } else if (clientY > window.innerHeight - CATEGORY_REORDER_EDGE_ZONE) {
          window.scrollBy(0, CATEGORY_REORDER_SCROLL_STEP);
        }
      }

      function startEdgeScrollLoop() {
        stopEdgeScrollLoop();
        const tick = () => {
          if (!session || !session.dragging) return;
          edgeScroll(session.lastClientY);
          session.insertIndex = findInsertIndex(session.lastClientY, session.card);
          updateInsertIndicator(session.insertIndex);
          moveFloat(session.lastClientX, session.lastClientY);
          scrollRaf = requestAnimationFrame(tick);
        };
        scrollRaf = requestAnimationFrame(tick);
      }

      function moveFloat(clientX, clientY) {
        if (!session || !session.floatEl) return;
        session.floatEl.style.left = `${clientX - session.offsetX}px`;
        session.floatEl.style.top = `${clientY - session.offsetY}px`;
      }

      function startDrag() {
        if (!session || session.dragging) return;
        const s = session;
        if (s.longPressTimer) {
          clearTimeout(s.longPressTimer);
          s.longPressTimer = null;
        }

        s.fromIndex = categories.indexOf(s.categoryName);
        if (s.fromIndex < 0) return;

        s.dragging = true;
        const card = s.card;
        const rect = card.getBoundingClientRect();
        card.classList.add('category-reorder-source', 'category-reorder-active');

        const floatEl = card.cloneNode(true);
        floatEl.classList.add('category-reorder-float');
        floatEl.classList.remove('category-reorder-source', 'category-reorder-active');
        floatEl.setAttribute('aria-hidden', 'true');
        floatEl.style.pointerEvents = 'none';
        floatEl.style.width = `${rect.width}px`;
        floatEl.style.left = `${rect.left}px`;
        floatEl.style.top = `${rect.top}px`;
        document.body.appendChild(floatEl);
        s.floatEl = floatEl;
        s.offsetX = s.lastClientX - rect.left;
        s.offsetY = s.lastClientY - rect.top;

        lockPageScroll();
        try {
          s.handle.setPointerCapture(s.pointerId);
          s.handle.addEventListener('lostpointercapture', onHandleLostPointerCapture);
        } catch (err) {
          /* ignore */
        }

        s.insertIndex = findInsertIndex(s.lastClientY, card);
        updateInsertIndicator(s.insertIndex);
        moveFloat(s.lastClientX, s.lastClientY);
        if (s.pointerType !== 'touch') startEdgeScrollLoop();
      }

      function applyCategoryReorder(fromIndex, insertIndex) {
        resetDragUI(null);
        if (fromIndex < 0 || categories.length < 2) return;
        if (insertIndex === fromIndex || insertIndex === fromIndex + 1) return;
        const next = categories.slice();
        const [item] = next.splice(fromIndex, 1);
        if (insertIndex > fromIndex) insertIndex -= 1;
        next.splice(insertIndex, 0, item);
        categories = next;
        saveCategories();
        syncCategorySelect(categorySelect.value);
        renderCategoryCards();
        renderChecklistItems();
        resetDragUI(null);
      }

      function detachMoveListener() {
        document.removeEventListener('pointermove', onDocumentPointerMove);
      }

      function attachMoveListener() {
        detachMoveListener();
        document.addEventListener('pointermove', onDocumentPointerMove, { passive: false });
      }

      function releaseHandlePointerCapture(handle, pointerId) {
        if (!handle || pointerId == null) return;
        try {
          if (handle.hasPointerCapture && handle.hasPointerCapture(pointerId)) {
            handle.releasePointerCapture(pointerId);
          }
        } catch (err) {
          /* ignore */
        }
      }

      function attachEndListeners() {
        if (endListenersAttached) return;
        window.addEventListener('pointerup', onWindowPointerEnd, true);
        window.addEventListener('pointercancel', onWindowPointerEnd, true);
        window.addEventListener('touchend', onWindowTouchEnd, true);
        window.addEventListener('touchcancel', onWindowTouchEnd, true);
        endListenersAttached = true;
      }

      function detachEndListeners() {
        if (!endListenersAttached) return;
        window.removeEventListener('pointerup', onWindowPointerEnd, true);
        window.removeEventListener('pointercancel', onWindowPointerEnd, true);
        window.removeEventListener('touchend', onWindowTouchEnd, true);
        window.removeEventListener('touchcancel', onWindowTouchEnd, true);
        endListenersAttached = false;
      }

      function purgeDragArtifacts(activeSession) {
        document.querySelectorAll('.category-reorder-float').forEach((el) => el.remove());
        categoriesContainer.querySelectorAll('.checklist-category-card').forEach((card) => {
          card.classList.remove('category-reorder-source', 'category-reorder-active');
        });
        if (activeSession && activeSession.floatEl && activeSession.floatEl.isConnected) {
          activeSession.floatEl.remove();
        }
        if (activeSession && activeSession.card) {
          activeSession.card.classList.remove('category-reorder-source', 'category-reorder-active');
        }
        if (insertIndicator) {
          insertIndicator.hidden = true;
          insertIndicator.style.display = 'none';
          insertIndicator.style.pointerEvents = 'none';
        }
      }

      function resetDragUI(activeSession) {
        stopEdgeScrollLoop();
        forceUnlockPageScroll();
        detachMoveListener();
        detachEndListeners();
        if (activeSession && activeSession.longPressTimer) {
          clearTimeout(activeSession.longPressTimer);
          activeSession.longPressTimer = null;
        }
        if (activeSession && activeSession.handle) {
          activeSession.handle.removeEventListener('lostpointercapture', onHandleLostPointerCapture);
          releaseHandlePointerCapture(activeSession.handle, activeSession.pointerId);
        }
        purgeDragArtifacts(activeSession);
      }

      function cleanup() {
        const active = session;
        session = null;
        resetDragUI(active);
      }

      function endSession() {
        if (!session || session.ending) return;
        session.ending = true;
        const wasDragging = session.dragging;
        const fromIndex = session.fromIndex;
        const insertIndex = session.insertIndex;
        cleanup();
        if (wasDragging) {
          applyCategoryReorder(fromIndex, insertIndex);
        }
      }

      function cancelPending() {
        if (!session || session.dragging) return;
        endSession();
      }

      function pointerIdMatches(event) {
        if (!session || event.pointerId == null) return true;
        return event.pointerId === session.pointerId;
      }

      function onWindowPointerEnd(event) {
        if (!session) return;
        if (!pointerIdMatches(event)) return;
        endSession();
      }

      function onWindowTouchEnd() {
        if (!session || session.pointerType !== 'touch') return;
        endSession();
      }

      function onHandleLostPointerCapture() {
        if (!session || !session.dragging || session.ending) return;
        endSession();
      }

      function onDocumentPointerMove(event) {
        if (!session || event.pointerId !== session.pointerId) return;
        session.lastClientX = event.clientX;
        session.lastClientY = event.clientY;

        if (!session.dragging) {
          const dx = event.clientX - session.startX;
          const dy = event.clientY - session.startY;
          const distance = Math.hypot(dx, dy);
          if (session.pointerType === 'touch') {
            if (distance > CATEGORY_REORDER_MOVE_THRESHOLD) {
              if (session.longPressTimer) {
                clearTimeout(session.longPressTimer);
                session.longPressTimer = null;
              }
            }
            return;
          }
          if (distance >= CATEGORY_REORDER_MOVE_THRESHOLD) {
            startDrag();
          }
          return;
        }

        event.preventDefault();
        session.insertIndex = findInsertIndex(event.clientY, session.card);
        updateInsertIndicator(session.insertIndex);
        moveFloat(event.clientX, event.clientY);
      }

      function onHandlePointerDown(event) {
        if (categories.length < 2) return;
        if (event.button !== 0 && event.pointerType === 'mouse') return;
        if (session) endSession();

        const handle = event.currentTarget;
        const card = handle.closest('.checklist-category-card');
        if (!card) return;

        session = {
          pointerId: event.pointerId,
          pointerType: event.pointerType,
          handle,
          card,
          categoryName: card.dataset.categoryName || '',
          startX: event.clientX,
          startY: event.clientY,
          lastClientX: event.clientX,
          lastClientY: event.clientY,
          fromIndex: -1,
          insertIndex: 0,
          dragging: false,
          ending: false,
          longPressTimer: null,
          floatEl: null,
          offsetX: 0,
          offsetY: 0
        };

        attachEndListeners();
        attachMoveListener();

        if (event.pointerType === 'touch') {
          session.longPressTimer = setTimeout(() => {
            if (session && !session.dragging && !session.ending) startDrag();
          }, CATEGORY_REORDER_LONG_PRESS_MS);
        }
      }

      function ensureInsertIndicator() {
        if (insertIndicator && insertIndicator.isConnected && insertIndicator.parentNode === categoriesContainer) {
          return;
        }
        insertIndicator = document.createElement('div');
        insertIndicator.className = 'category-insert-indicator';
        insertIndicator.hidden = true;
        insertIndicator.style.display = 'none';
        categoriesContainer.appendChild(insertIndicator);
      }

      function bindHandles() {
        resetDragUI(null);
        ensureInsertIndicator();
        if (categories.length < 2) {
          if (insertIndicator) {
            insertIndicator.hidden = true;
            insertIndicator.style.display = 'none';
          }
          return;
        }
        categoriesContainer.querySelectorAll('.category-drag-handle').forEach((handle) => {
          handle.addEventListener('pointerdown', onHandlePointerDown);
        });
      }

      return { bindHandles, cancelPending, forceReset: () => resetDragUI(null) };
    })();

    function removeCategoryByName(catName) {
      if (categories.length <= 1) return;
      if (!categories.includes(catName)) return;
      categories = categories.filter(c => c !== catName);
      checklistItems = checklistItems.filter(item => item.category !== catName);
      delete collapsedCategories[catName];
      saveCategories();
      saveChecklistItems();
      saveCategoryCollapseState();
      const prevSelect = categorySelect.value === catName ? (categories[0] || '') : categorySelect.value;
      renderCategoryCards();
      syncCategorySelect(prevSelect);

    function syncCategorySelect(preferred) {
      const prev = preferred !== undefined && preferred !== null

        : (categorySelect.value || categories[0] || '');
      categorySelect.innerHTML = '';
      categories.forEach(cat => {
        const opt = document.createElement('option');
        opt.value = cat;
        opt.textContent = cat;
        categorySelect.appendChild(opt);
      });
      if (categories.includes(prev)) {
        categorySelect.value = prev;

        categorySelect.value = categories[0];

    function mergeCategoriesFromItems() {
      const set = new Set(categories);
      let changed = false;
      checklistItems.forEach(item => {
        const c = item && item.category;
        if (c && !set.has(c)) {
          categories.push(c);
          set.add(c);
          changed = true;
        }
      });
      if (changed) saveCategories();
      return changed;
    }

    const MEMBER_STRIP_REORDER_LONG_PRESS_MS = 500;
    const MEMBER_STRIP_REORDER_MOVE_THRESHOLD = 10;

    const memberStripReorder = (function () {
      let session = null;
      let insertIndicator = null;

      function getMemberChips() {
        return [...memberList.querySelectorAll('.member-chip[data-member-id]')];
      }

      function ensureIndicator() {
        if (insertIndicator && insertIndicator.isConnected) return;
        insertIndicator = document.createElement('div');
        insertIndicator.className = 'member-insert-indicator';
        memberList.appendChild(insertIndicator);
      }

      function findInsertIndex(clientX, sourceChip) {
        const chips = getMemberChips();
        for (let i = 0; i < chips.length; i++) {
          const chip = chips[i];
          if (chip === sourceChip) continue;
          const rect = chip.getBoundingClientRect();
          if (clientX < rect.left + rect.width / 2) return i;
        }
        return chips.length;
      }

      function updateIndicator(insertIndex) {
        if (!insertIndicator) return;
        const chips = getMemberChips();
        if (!chips.length) {
          insertIndicator.style.display = 'none';
          return;
        }
        let left;
        if (insertIndex <= 0) left = chips[0].offsetLeft;
        else if (insertIndex >= chips.length) left = chips[chips.length - 1].offsetLeft + chips[chips.length - 1].offsetWidth;
        else left = chips[insertIndex].offsetLeft;
        insertIndicator.style.left = `${left}px`;
        insertIndicator.style.display = 'block';
      }

      function applyReorder(fromIndex, insertIndex) {
        if (fromIndex < 0 || members.length < 2) return;
        if (insertIndex === fromIndex || insertIndex === fromIndex + 1) return;
        const next = members.slice();
        const [picked] = next.splice(fromIndex, 1);
        if (insertIndex > fromIndex) insertIndex -= 1;
        next.splice(insertIndex, 0, picked);
        members = next;
        saveMembers();
        syncAllMembersItems();
        saveChecklistItems();
        renderMemberList();
        refreshAddItemOwnerRadiosIfNeeded();
        renderChecklistItems();
        renderHomePage();
        renderMemberManagePage();
      }

      function cleanup(apply) {
        const s = session;
        session = null;
        document.removeEventListener('pointermove', onMove);
        window.removeEventListener('pointerup', onEnd, true);
        window.removeEventListener('pointercancel', onEnd, true);
        if (!s) return;
        if (s.longPressTimer) clearTimeout(s.longPressTimer);
        if (s.floatEl && s.floatEl.isConnected) s.floatEl.remove();
        if (s.chip) s.chip.classList.remove('member-reorder-source');
        if (insertIndicator) insertIndicator.style.display = 'none';
        memberList.classList.remove('is-reordering');
        if (s.chip && s.pointerId != null && s.chip.releasePointerCapture) {
          try { s.chip.releasePointerCapture(s.pointerId); } catch (_) { /* ignore */ }
        }
        if (apply && s.dragging) applyReorder(s.fromIndex, s.insertIndex);
      }

      function startDrag() {
        if (!session || session.dragging) return;
        const s = session;
        s.dragging = true;
        s.fromIndex = members.findIndex(m => m.id === s.memberId);
        if (s.fromIndex < 0) return;
        s.chip.classList.add('member-reorder-source');
        memberList.classList.add('is-reordering');
        s.frozenScrollLeft = memberList.scrollLeft;
        if (s.pointerId != null && s.chip.setPointerCapture) {
          try { s.chip.setPointerCapture(s.pointerId); } catch (_) { /* ignore */ }
        }
        const rect = s.chip.getBoundingClientRect();
        const floatEl = s.chip.cloneNode(true);
        floatEl.classList.add('member-reorder-float');
        floatEl.style.width = `${rect.width}px`;
        floatEl.style.left = `${rect.left}px`;
        floatEl.style.top = `${rect.top}px`;
        document.body.appendChild(floatEl);
        s.floatEl = floatEl;
        s.offsetX = s.lastX - rect.left;
        s.offsetY = s.lastY - rect.top;
        s.insertIndex = findInsertIndex(s.lastX, s.chip);
        updateIndicator(s.insertIndex);
      }

      function onMove(event) {
        if (!session || event.pointerId !== session.pointerId) return;
        session.lastX = event.clientX;
        session.lastY = event.clientY;
        if (!session.dragging) {
          const distance = Math.hypot(event.clientX - session.startX, event.clientY - session.startY);
          if (distance > MEMBER_STRIP_REORDER_MOVE_THRESHOLD) {
            session.moved = true;
            if (session.longPressTimer) {
              clearTimeout(session.longPressTimer);
              session.longPressTimer = null;
            }
          }
          return;
        }
        event.preventDefault();
        if (memberList.scrollLeft !== session.frozenScrollLeft) {
          memberList.scrollLeft = session.frozenScrollLeft;
        }
        session.insertIndex = findInsertIndex(event.clientX, session.chip);
        updateIndicator(session.insertIndex);
        if (session.floatEl) {
          session.floatEl.style.left = `${event.clientX - session.offsetX}px`;
          session.floatEl.style.top = `${event.clientY - session.offsetY}px`;
        }
      }

      function onEnd(event) {
        if (!session || (event.pointerId != null && event.pointerId !== session.pointerId)) return;
        const dragged = !!session.dragging;
        const memberId = session.memberId;
        const endX = typeof event.clientX === 'number' ? event.clientX : session.lastX;
        const endY = typeof event.clientY === 'number' ? event.clientY : session.lastY;
        const dx = Math.abs(endX - session.startX);
        const dy = Math.abs(endY - session.startY);
        const wasTap = !dragged && !session.longPressTriggered && !session.moved && dx < 10 && dy < 10;
        cleanup(true);
        if (dragged) return;
        if (wasTap && memberId) openMemberPendingModal(memberId);
      }

      function onPointerDown(event) {
        if (members.length < 2) return;
        if (event.button !== 0 && event.pointerType === 'mouse') return;
        const chip = event.currentTarget;
        if (session) cleanup(false);
        ensureIndicator();
        session = {
          pointerId: event.pointerId,
          chip,
          memberId: chip.dataset.memberId || '',
          startX: event.clientX,
          startY: event.clientY,
          lastX: event.clientX,
          lastY: event.clientY,
          fromIndex: -1,
          insertIndex: 0,
          dragging: false,
          moved: false,
          longPressTriggered: false,
          longPressTimer: window.setTimeout(() => {
            if (session && !session.dragging) {
              session.longPressTriggered = true;
              startDrag();
            }
          }, MEMBER_STRIP_REORDER_LONG_PRESS_MS),
          floatEl: null,
          offsetX: 0,
          offsetY: 0,
          frozenScrollLeft: 0
        };
        document.addEventListener('pointermove', onMove, { passive: false });
        window.addEventListener('pointerup', onEnd, true);
        window.addEventListener('pointercancel', onEnd, true);
      }

      function bindHandles() {
        ensureIndicator();
        getMemberChips().forEach(chip => {
          chip.replaceWith(chip.cloneNode(true));
        });
        getMemberChips().forEach(chip => {
          chip.addEventListener('pointerdown', onPointerDown);
        });
      }

      return { bindHandles, forceReset: () => cleanup(false) };
    })();

    function removeMemberById(memberId) {
      const idx = members.findIndex(m => m.id === memberId);
      if (idx === -1) return;
      const removedName = members[idx].name;
      members.splice(idx, 1);
      checklistItems.forEach(item => {
        if (item.ownerIds) item.ownerIds = item.ownerIds.filter(id => id !== memberId);
        if (item.completedOwnerIds) item.completedOwnerIds = item.completedOwnerIds.filter(id => id !== memberId);
        syncItemOwnersFromIds(item);
      });
      saveMembers();
      saveChecklistItems();
      renderMemberList();
      refreshAddItemOwnerRadiosIfNeeded();
      renderChecklistItems();
      renderHomePage();
      renderMemberManagePage();
    }

    function isOwnerPendingForItem(item, ownerName) {
      const owners = item.owners || [];
      if (!owners.includes(ownerName)) return false;
      return !(item.completedOwners || []).includes(ownerName);
    }

    function sortItemsByCategoryOrder(items) {
      const orderMap = new Map(categories.map((cat, index) => [cat, index]));
      return [...items].sort((a, b) => {
        const catA = orderMap.get(a.category) ?? 999;
        const catB = orderMap.get(b.category) ?? 999;
        if (catA !== catB) return catA - catB;
        return String(a.name).localeCompare(String(b.name), 'zh');
      });
    }

    function getMemberAssignedItems(memberName) {
      const member = members.find(m => m.name === memberName);
      if (!member) return [];
      return checklistItems.filter(item => {
        normalizeItemOwners(item);
        const ids = item.ownerIds || [];
        return ids.includes('all') || ids.includes(member.id);
      });
    }

    function getMemberCompletionPercent(memberName) {
      const assigned = getMemberAssignedItems(memberName);
      if (!assigned.length) return 100;
      const completed = assigned.filter(item => !isOwnerPendingForItem(item, memberName)).length;
      return Math.round((completed / assigned.length) * 100);
    }

    function getMemberEncouragementText(percent) {
      if (percent >= 100) return '全部准备完成 🎉';
      if (percent >= 80) return '快完成啦 🌞';
      if (percent >= 40) return '准备得不错 ✈️';
      return '刚刚开始准备 🌱';
    }

    function updateMemberPendingSummary(memberName) {
      const percent = getMemberCompletionPercent(memberName);
      memberPendingPercent.textContent = `${percent}%`;
      memberPendingEncourage.textContent = getMemberEncouragementText(percent);
    }

    function renderMemberPendingList(memberName) {
      const assigned = sortItemsByCategoryOrder(getMemberAssignedItems(memberName));
      memberPendingList.innerHTML = '';
      memberPendingTitle.textContent = `${memberName} 的打包清单`;
      updateMemberPendingSummary(memberName);
      assigned.forEach(item => {
        const li = document.createElement('li');
        li.className = 'member-pending-item';
        const toggleBtn = document.createElement('button');
        toggleBtn.type = 'button';
        toggleBtn.className = 'member-pending-toggle';
        const done = !isOwnerPendingForItem(item, memberName);
        toggleBtn.textContent = done ? '☑' : '□';
        const nameSpan = document.createElement('span');
        nameSpan.className = 'member-pending-name';
        nameSpan.textContent = item.name;
        if (done) li.classList.add('done');
        toggleBtn.addEventListener('click', () => {
          toggleOwnerCompletion(item, memberName);
          saveChecklistItems();
          renderChecklistItems();
          renderHomePage();
          renderMemberPendingList(memberName);
        });
        li.appendChild(toggleBtn);
        li.appendChild(nameSpan);
        memberPendingList.appendChild(li);
      });
    }

    function openMemberPendingModal(memberId) {
      const member = members.find(m => m.id === memberId);
      if (!member) return;
      renderMemberPendingList(member.name);
      memberPendingModal.classList.add('show');
    }

    function closeMemberPendingModal() {
      memberPendingModal.classList.remove('show');
      memberPendingList.innerHTML = '';
    }

    function openMemberActionModal(memberId) {
      const member = members.find(m => m.id === memberId);
      if (!member) return;
      memberActionTargetId = memberId;
      memberActionTitle.textContent = member.name;
      memberActionModal.classList.add('show');
    }

    function closeMemberActionModal() {
      memberActionTargetId = null;
      memberActionModal.classList.remove('show');
    }

    function openEditMemberModal(memberId) {
      const member = members.find(m => m.id === memberId);
      if (!member) return;
      editingMemberId = memberId;
      editMemberNameInput.value = member.name;
      editMemberModal.classList.add('show');
      editMemberNameInput.focus();
      editMemberNameInput.select();
    }

    function closeEditMemberModal() {
      editMemberModal.classList.remove('show');
      editingMemberId = null;
    }

    function saveEditedMember() {
      if (!editingMemberId) return;
      const member = members.find(m => m.id === editingMemberId);
      if (!member) return;
      const nextName = editMemberNameInput.value.trim();
      if (!nextName) {
        editMemberNameInput.focus();
        return;
      }
      if (members.some(m => m.id !== editingMemberId && m.name === nextName)) {
        editMemberNameInput.select();
        return;
      }
      const oldName = member.name;
      if (oldName !== nextName) {
        member.name = nextName;
        checklistItems.forEach(syncItemOwnersFromIds);
        saveMembers();
        saveChecklistItems();
        renderMemberList();
        refreshAddItemOwnerRadiosIfNeeded();
        renderChecklistItems();
        renderHomePage();
      }
      if (uiState.page === 'members') renderMemberManagePage();
      closeEditMemberModal();
    }

    function getAllMemberNames() {
      return members.map(m => m.name).filter(Boolean);
    }

    function getCurrentUserMemberName() {
      const me = members.find(m => m.name === '我');
      if (me) return me.name;
      return members[0] ? members[0].name : '';
    }

    function getMemberIdByName(name) {
      const m = members.find(x => x.name === name);
      return m ? m.id : null;
    }

    function getMemberNameById(id) {
      const m = members.find(x => x.id === id);
      return m ? m.name : '';
    }

    function ownerIdsToNames(ids) {
      return (ids || []).map(id => getMemberNameById(id)).filter(Boolean);
    }

    function namesToOwnerIds(names) {
      return (names || []).map(name => getMemberIdByName(name)).filter(Boolean);
    }

    function getDefaultOwnerIds() {
      const me = members.find(m => m.name === '我');
      if (me) return [me.id];
      return members[0] ? [members[0].id] : [];
    }

    function readOwnerIdsFromContainer(container) {
      if (!container) return [];
      const allCb = container.querySelector('.owner-all-checkbox');
      if (allCb && allCb.checked) return ['all'];
      return Array.from(container.querySelectorAll('input[name="owners"]:checked'))
        .map(cb => cb.value)
        .filter(Boolean);
    }

    function getEffectiveOwnerIds(item) {
      const ids = item.ownerIds || [];
      if (ids.includes('all')) return members.map(m => m.id);
      return ids.filter(id => members.some(m => m.id === id));
    }

    function syncItemOwnersFromIds(item) {
      if (!Array.isArray(item.ownerIds)) item.ownerIds = [];
      const effIds = getEffectiveOwnerIds(item);
      item.owners = effIds.map(getMemberNameById).filter(Boolean);
      if (!Array.isArray(item.completedOwnerIds)) {
        item.completedOwnerIds = namesToOwnerIds(item.completedOwners || []);
      }
      item.completedOwnerIds = (item.completedOwnerIds || []).filter(id => effIds.includes(id));
      item.completedOwners = item.completedOwnerIds.map(getMemberNameById).filter(Boolean);
      item.completed = isItemAllOwnersComplete(item);
    }

    function normalizeItemOwners(item) {
      if (Array.isArray(item.ownerIds) && item.ownerIds.length) {
        if (!item.ownerIds.includes('all')) {
          const valid = item.ownerIds.filter(id => members.some(m => m.id === id));
          if (members.length >= 2 && valid.length === members.length) {
            item.ownerIds = ['all'];
          } else {
            item.ownerIds = valid;
          }
        }
        delete item.isAllMembers;
        syncItemOwnersFromIds(item);
        return;
      }
      if (item.isAllMembers) {
        item.ownerIds = ['all'];
      } else {
        item.ownerIds = namesToOwnerIds(item.owners || []);
      }
      delete item.isAllMembers;
      item.completedOwnerIds = namesToOwnerIds(item.completedOwners || []);
      syncItemOwnersFromIds(item);
    }

    function ownersMatchAllMembers(owners) {
      const allNames = getAllMemberNames();
      if (!allNames.length || !owners || !owners.length) return false;
      if (owners.length !== allNames.length) return false;
      const set = new Set(owners);
      return allNames.every(name => set.has(name));
    }

    function syncItemAllMembersOwners(item) {
      if (!item.isAllMembers) return;
      item.owners = getAllMemberNames();
      if (!Array.isArray(item.completedOwners)) item.completedOwners = [];
      item.completedOwners = item.completedOwners.filter(name => item.owners.includes(name));
      item.completed = isItemAllOwnersComplete(item);
    }

    function syncAllMembersItems() {
      checklistItems.forEach(syncItemOwnersFromIds);
    }

    function normalizeItemAllMembers(item) {
      if (item.isAllMembers === true) {
        syncItemAllMembersOwners(item);
        return;
      }
      if (item.isAllMembers !== false && ownersMatchAllMembers(item.owners)) {
        item.isAllMembers = true;
        syncItemAllMembersOwners(item);
      }
    }

    function readOwnersFromContainer(container) {
      const ownerIds = readOwnerIdsFromContainer(container);
      const owners = ownerIdsToNames(ownerIds);
      return { ownerIds, owners, isAllMembers: false };
    }

    function syncOwnerAllCheckboxState(container) {
      const allCb = container.querySelector('.owner-all-checkbox');
      if (!allCb) return;
      const memberBoxes = container.querySelectorAll('input[name="owners"]');
      if (!memberBoxes.length) {
        allCb.checked = false;
        return;
      }
      allCb.checked = [...memberBoxes].every(cb => cb.checked);
    }

    function renderOwnerCheckboxes(container, options = {}) {
      let selectedOwnerIds = options.selectedOwnerIds || [];
      if (!selectedOwnerIds.length && options.selectedOwners && options.selectedOwners.length) {
        selectedOwnerIds = namesToOwnerIds(options.selectedOwners);
      }
      const selectAll = selectedOwnerIds.includes('all') || !!options.isAllMembers;
      const selectMeByDefault = !!options.selectMeByDefault;

    function getPendingOwners(item) {
      const done = new Set(item.completedOwners || []);

    function isItemAllOwnersComplete(item) {
      const owners = item.owners || [];
      if (!owners.length) return !!item.completed;
      const done = new Set(item.completedOwners || []);
      return owners.every(name => done.has(name));
    }

    function normalizeItemCompletion(item) {
      normalizeItemOwners(item);
      if (!Array.isArray(item.owners)) item.owners = [];
      if (!Array.isArray(item.completedOwners)) item.completedOwners = [];
      item.completedOwners = item.completedOwners.filter(name => item.owners.includes(name));
      if (item.completed && item.owners.length && !item.completedOwners.length) {
        item.completedOwners = [...item.owners];
        item.completedOwnerIds = namesToOwnerIds(item.completedOwners);
      }
      item.completed = isItemAllOwnersComplete(item);
    }

    function toggleOwnerCompletion(item, ownerName) {
      if (!(item.owners || []).includes(ownerName)) return;
      if (!item.completedOwners) item.completedOwners = [];
      const idx = item.completedOwners.indexOf(ownerName);
      if (idx === -1) item.completedOwners.push(ownerName);
      else item.completedOwners.splice(idx, 1);
      item.completedOwnerIds = namesToOwnerIds(item.completedOwners);
      item.completed = isItemAllOwnersComplete(item);
    }

    function isTravelNameUnset(name) {
      return !String(name || '').trim();
    }

    function getDisplayTravelName(travel) {
      return isTravelNameUnset(travel.name) ? TRIP_TITLE_PLACEHOLDER : travel.name.trim();
    }


    function formatTravelDateRange(travel) {
      const start = String(travel.startDate || '').trim();
      const end = String(travel.endDate || '').trim();
      const startLabel = toDotDateLabel(start);
      const endLabel = toDotDateLabel(end);
      if (startLabel && endLabel) return `${startLabel} - ${endLabel}`;
      if (startLabel) return `${startLabel} 起`;
      if (endLabel) return `至 ${endLabel}`;
      return '未设置日期';
    }

    function getDaysLeft(startDate) {
      const iso = normalizeToIsoDate(startDate);
      if (!iso) return null;
      const parts = iso.split('-').map(Number);
      const start = new Date(parts[0], parts[1] - 1, parts[2]);
      const today = new Date();
      start.setHours(0, 0, 0, 0);
      today.setHours(0, 0, 0, 0);
      return Math.round((start.getTime() - today.getTime()) / 86400000);
    }

    function getCountdownText(startDate) {
      const daysLeft = getDaysLeft(startDate);
      if (daysLeft === null) return '';
      if (daysLeft < 0) return '旅程已结束 🌴';
      if (daysLeft === 0) return '今天出发 🌞';
      if (daysLeft === 1) return '明天出发 ✈️';
      if (daysLeft <= 7) return `还有 ${daysLeft} 天出发 ✈️`;
      return `还有 ${daysLeft} 天出发`;
    }

    function getCountdownStyle(startDate) {
      const daysLeft = getDaysLeft(startDate);
      if (daysLeft === null) return null;
      if (daysLeft < 0) return { color: '#AAB6CC', fontWeight: '400' };
      if (daysLeft === 0) return { color: '#D97706', fontWeight: '700' };
      if (daysLeft === 1) return { color: '#FF8C42', fontWeight: '600' };
      if (daysLeft <= 7) return { color: '#F4A261', fontWeight: '600' };
      if (daysLeft <= 30) return { color: '#6B93D6', fontWeight: '400' };
      return { color: '#8C9BB5', fontWeight: '400' };
    }

    function normalizeToIsoDate(rawInput) {
      const raw = String(rawInput || '').trim();
      if (!raw) return '';
      let y = 0;
      let m = 0;
      let d = 0;
      if (/^\d{8}$/.test(raw)) {
        y = Number(raw.slice(0, 4));
        m = Number(raw.slice(4, 6));
        d = Number(raw.slice(6, 8));
      } else {
        const normalized = raw.replace(/[./]/g, '-');
        const match = normalized.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
        if (!match) return '';
        y = Number(match[1]);
        m = Number(match[2]);
        d = Number(match[3]);
      }
      if (!y || m < 1 || m > 12 || d < 1 || d > 31) return '';
      const dt = new Date(y, m - 1, d);
      if (
        Number.isNaN(dt.getTime()) ||
        dt.getFullYear() !== y ||
        dt.getMonth() + 1 !== m ||
        dt.getDate() !== d
      ) return '';
      return `${String(y).padStart(4, '0')}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    }

    function normalizeDateInputField(textInput, pickerInput) {
      const normalized = normalizeToIsoDate(textInput.value);
      textInput.value = normalized;
      if (pickerInput) pickerInput.value = normalized;
      return normalized;
    }

    function openDatePickerInput(pickerInput, textInput) {
      if (!pickerInput) return;
      const iso = normalizeToIsoDate(textInput ? textInput.value : pickerInput.value);
      if (iso) pickerInput.value = iso;
      try {
        if (typeof pickerInput.showPicker === 'function') {
          pickerInput.showPicker();
          return;
        }
      } catch (_) { /* ignore */ }
      pickerInput.click();
    }

    function bindTravelInfoDateField(row, textInput, pickerInput) {
      if (!row || !textInput || !pickerInput) return;
      const calendarBtn = row.querySelector('.date-picker-trigger');

      function openPicker() {
        normalizeDateInputField(textInput, pickerInput);
        openDatePickerInput(pickerInput, textInput);
      }

      if (calendarBtn) {
        calendarBtn.addEventListener('click', (event) => {
          event.preventDefault();
          event.stopPropagation();
          openPicker();
        });
      }

      row.addEventListener('click', (event) => {
        if (event.target === textInput) return;
        if (calendarBtn && (event.target === calendarBtn || calendarBtn.contains(event.target))) return;
        event.preventDefault();
        event.stopPropagation();
        openPicker();
      });

      textInput.addEventListener('click', (event) => {
        event.stopPropagation();
      });

      textInput.addEventListener('blur', () => {
        normalizeDateInputField(textInput, pickerInput);
      });

      textInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          event.preventDefault();
          normalizeDateInputField(textInput, pickerInput);
          textInput.blur();
        }
      });

      pickerInput.addEventListener('change', () => {
        const iso = normalizeToIsoDate(pickerInput.value);
        textInput.value = iso;
        pickerInput.value = iso;
      });

      pickerInput.addEventListener('input', () => {
        const iso = normalizeToIsoDate(pickerInput.value);
        if (!iso) return;
        textInput.value = iso;
        pickerInput.value = iso;
      });
    }

    function getTravelItemProgress(travel) {
      const items = Array.isArray(travel.items) ? travel.items : [];
      const total = items.length;
      if (!total) return { completed: 0, total: 0, percent: 0 };
      const completed = items.filter(item => isItemAllOwnersComplete(item)).length;
      return {
        completed,
        total,
        percent: Math.round((completed / total) * 100)
      };
    }
