    function normalizeTravelRecord(raw, index) {
      const travel = createDefaultTravelData({
        id: raw.id || createId(),
        name: raw.name || '',
        startDate: raw.startDate || '',
        endDate: raw.endDate || '',
        order: typeof raw.order === 'number' ? raw.order : index,
        membersSectionTitle: raw.membersSectionTitle || DEFAULT_MEMBERS_SECTION_TITLE,
        members: Array.isArray(raw.members) ? raw.members : [],
        categories: Array.isArray(raw.categories) && raw.categories.length ? raw.categories : [...DEFAULT_CATEGORY_ORDER],
        items: Array.isArray(raw.items) ? raw.items : [],
        collapsedCategories: raw.collapsedCategories && typeof raw.collapsedCategories === 'object' ? raw.collapsedCategories : {},
        coverImage: raw.coverImage || pickRandomTravelCoverId()
      });
      travel.members = travel.members.map(m => ({
        id: m.id || createId(),
        name: String(m.name || '').trim(),
        avatarUrl: (typeof m.avatarUrl === 'string') ? m.avatarUrl.trim() : ''
      })).filter(m => m.name);
      if (!travel.members.length) {
        travel.members = ['我', '小A', '小B'].map(name => ({ id: createId(), name, avatarUrl: '' }));
      }
      travel.categories = [...new Set(travel.categories.map(s => String(s).trim()).filter(Boolean))];
      if (!travel.categories.length) travel.categories = [...DEFAULT_CATEGORY_ORDER];
      travel.items.forEach(normalizeItemCompletion);
      return travel;
    }

    function loadTravels() {
      try {
        const raw = localStorage.getItem(TRAVELS_STORAGE_KEY);
        if (raw) {
          const parsed = JSON.parse(raw);
          if (Array.isArray(parsed) && parsed.length) {
            travels = parsed.map((t, i) => normalizeTravelRecord(t, i));
            sortTravelsByOrder();
            travels.forEach((t, i) => { t.order = i; });
            saveTravels();
            return;
          }
        }
      } catch (e) {
        travels = [];
      }
      migrateLegacyStorageToTravels();
    }

    function handleSaveTravelInfo(event) {

    function startInlineEditMemberRow(row, memberId) {
      const member = members.find(m => m.id === memberId);
      if (!member || row.dataset.editing === '1') return;
      row.dataset.editing = '1';
      const nameEl = row.querySelector('.member-manage-name');
      if (!nameEl) return;
      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'member-manage-name-input';
      input.value = member.name;
      input.maxLength = 20;
      const finish = (save) => {
        if (save) {
          const nextName = input.value.trim();
          if (!nextName) {
            renderMemberManagePage();
            return;
          }
          if (members.some(m => m.id !== memberId && m.name === nextName)) {
            input.select();
            return;
          }
          const oldName = member.name;
          if (oldName !== nextName) {
            member.name = nextName;
            checklistItems.forEach(syncItemOwnersFromIds);
            saveMembers();
            saveChecklistItems();
            renderMemberList();
            refreshAddItemOwnerRadiosIfNeeded();
            renderChecklistItems();
            renderHomePage();
          }
        }
        renderMemberManagePage();
      };
      input.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') finish(true);
        if (event.key === 'Escape') finish(false);
      });
      input.addEventListener('blur', () => finish(true));
      nameEl.replaceWith(input);
      input.focus();
      input.select();
    }

    function getTravelCoverById(id) {
      return TRAVEL_COVERS.find(c => c.id === id) || TRAVEL_COVERS[0];
    }

    function pickRandomTravelCoverId() {
      return TRAVEL_COVERS[Math.floor(Math.random() * TRAVEL_COVERS.length)].id;
    }

    function pickDefaultCoverForIndex(index) {
      if (index === 0) return 'bluelake';
      if (index === 1) return 'santorini';
      return pickRandomTravelCoverId();
    }

    function getTravelCoverGradient(travel) {
      return getTravelCoverById(travel && travel.coverImage).gradient;
    }

    function coverBackgroundValue(cover) {
      const c = cover || TRAVEL_COVERS[0];
      if (c.image) return `url("${c.image}"), ${c.gradient}`;
      return c.gradient;
    }

    function getTravelCoverBackground(travel) {
      return coverBackgroundValue(getTravelCoverById(travel && travel.coverImage));
    }

    function renderHomePage() {
      travelsContainer.innerHTML = '';
      const sorted = getSortedTravels();
      sorted.forEach((travel, index) => {
        const card = document.createElement('div');
        card.className = 'card travel-card';
        card.dataset.travelId = travel.id;

        const thumb = document.createElement('div');
        thumb.className = 'travel-card-thumb';
        thumb.setAttribute('aria-hidden', 'true');
        thumb.style.backgroundImage = getTravelCoverBackground(travel);
        const overlay = document.createElement('div');
        overlay.className = 'travel-card-overlay';
        overlay.setAttribute('aria-hidden', 'true');

        const body = document.createElement('div');
        body.className = 'travel-card-body';

        const header = document.createElement('div');
        header.className = 'travel-card-header';
        const nameEl = document.createElement('span');
        nameEl.className = 'travel-card-name';
        if (isTravelNameUnset(travel.name)) nameEl.classList.add('placeholder');
        nameEl.textContent = getDisplayTravelName(travel);
        const dragHandle = document.createElement('div');
        dragHandle.className = 'travel-card-drag-handle';
        dragHandle.setAttribute('aria-hidden', 'true');
        dragHandle.title = '长按拖动排序';
        header.appendChild(nameEl);
        header.appendChild(dragHandle);

        const datesEl = document.createElement('div');
        datesEl.className = 'travel-card-dates';
        datesEl.textContent = formatTravelDateRange(travel);

        const countdownText = getCountdownText(travel.startDate);
        const countdownStyle = getCountdownStyle(travel.startDate);
        let countdownEl = null;
        if (countdownText && countdownStyle) {
          countdownEl = document.createElement('div');
          countdownEl.className = 'travel-card-countdown';
          countdownEl.textContent = countdownText;
          countdownEl.style.color = countdownStyle.color;
          countdownEl.style.fontWeight = countdownStyle.fontWeight;
        }

        const progress = getTravelItemProgress(travel);
        const progressRow = document.createElement('div');
        progressRow.className = 'travel-card-progress-row';
        const progressTrack = document.createElement('div');
        progressTrack.className = 'travel-card-progress-track';
        const progressFill = document.createElement('div');
        progressFill.className = 'travel-card-progress-fill';
        progressFill.style.width = `${progress.percent}%`;
        progressTrack.appendChild(progressFill);
        const progressEl = document.createElement('span');
        progressEl.className = 'travel-card-progress';
        progressEl.textContent = `${progress.percent}%`;
        progressEl.setAttribute('aria-label', `已完成 ${progress.completed}，共 ${progress.total}`);
        progressRow.appendChild(progressTrack);
        progressRow.appendChild(progressEl);

        body.appendChild(header);
        body.appendChild(datesEl);
        if (countdownEl) body.appendChild(countdownEl);
        body.appendChild(renderTravelCardAvatars(travel));
        body.appendChild(progressRow);

        card.appendChild(thumb);
        card.appendChild(overlay);
        card.appendChild(body);

        card.addEventListener('click', (event) => {
          if (event.target.closest('.travel-card-drag-handle')) return;
          travelListReorder.cancelPending();
          enterTravel(travel.id);
        });

        travelsContainer.appendChild(card);
      });

      travelListReorder.bindHandles();
    }

    const TRAVEL_REORDER_LONG_PRESS_MS = 500;
    const TRAVEL_REORDER_MOVE_THRESHOLD = 12;
    const TRAVEL_REORDER_EDGE_ZONE = 56;
    const TRAVEL_REORDER_SCROLL_STEP = 12;

    const travelListReorder = (function () {
      let session = null;
      let insertIndicator = null;
      let scrollRaf = null;
      let savedBodyOverflow = null;
      let savedScrollY = 0;
      let endListenersAttached = false;

      function getTravelCards() {
        return [...travelsContainer.querySelectorAll('.travel-card')];
      }

      function findInsertIndex(clientY, sourceCard) {
        const cards = getTravelCards();
        for (let i = 0; i < cards.length; i++) {
          const card = cards[i];
          if (card === sourceCard) continue;
          const rect = card.getBoundingClientRect();
          if (clientY < rect.top + rect.height / 2) return i;
        }
        return cards.length;
      }

      function updateInsertIndicator(insertIndex) {
        if (!insertIndicator) return;
        const cards = getTravelCards();
        if (!cards.length) {
          insertIndicator.hidden = true;
          return;
        }
        let top;
        if (insertIndex <= 0) {
          top = cards[0].offsetTop;
        } else if (insertIndex >= cards.length) {
          const last = cards[cards.length - 1];
          top = last.offsetTop + last.offsetHeight;
        } else {
          top = cards[insertIndex].offsetTop;
        }
        insertIndicator.style.top = `${top}px`;
        insertIndicator.hidden = false;
        insertIndicator.style.display = 'block';
      }

      function lockPageScroll() {
        if (savedBodyOverflow != null) return;
        savedBodyOverflow = document.body.style.overflow;
        savedScrollY = window.scrollY;
        document.body.style.overflow = 'hidden';
        document.body.style.position = 'fixed';
        document.body.style.top = `-${savedScrollY}px`;
        document.body.style.left = '0';
        document.body.style.right = '0';
        document.body.style.width = '100%';
        document.body.style.touchAction = 'none';
        homePage.classList.add('is-travel-reordering');
      }

      function forceUnlockPageScroll() {
        document.body.style.overflow = savedBodyOverflow || '';
        document.body.style.position = '';
        document.body.style.top = '';
        document.body.style.left = '';
        document.body.style.right = '';
        document.body.style.width = '';
        document.body.style.touchAction = '';
        homePage.classList.remove('is-travel-reordering');
        if (savedScrollY) window.scrollTo(0, savedScrollY);
        savedBodyOverflow = null;
        savedScrollY = 0;
      }

      function stopEdgeScrollLoop() {
        if (scrollRaf) {
          cancelAnimationFrame(scrollRaf);
          scrollRaf = null;
        }
      }

      function edgeScroll(clientY) {
        if (clientY < TRAVEL_REORDER_EDGE_ZONE) {
          window.scrollBy(0, -TRAVEL_REORDER_SCROLL_STEP);
        } else if (clientY > window.innerHeight - TRAVEL_REORDER_EDGE_ZONE) {
          window.scrollBy(0, TRAVEL_REORDER_SCROLL_STEP);
        }
      }

      function startEdgeScrollLoop() {
        stopEdgeScrollLoop();
        const tick = () => {
          if (!session || !session.dragging) return;
          edgeScroll(session.lastClientY);
          session.insertIndex = findInsertIndex(session.lastClientY, session.card);
          updateInsertIndicator(session.insertIndex);
          moveFloat(session.lastClientX, session.lastClientY);
          scrollRaf = requestAnimationFrame(tick);
        };
        scrollRaf = requestAnimationFrame(tick);
      }

      function moveFloat(clientX, clientY) {
        if (!session || !session.floatEl) return;
        session.floatEl.style.left = `${clientX - session.offsetX}px`;
        session.floatEl.style.top = `${clientY - session.offsetY}px`;
      }

      function startDrag() {
        if (!session || session.dragging) return;
        const s = session;
        if (s.longPressTimer) {
          clearTimeout(s.longPressTimer);
          s.longPressTimer = null;
        }
        const sorted = getSortedTravels();
        s.fromIndex = sorted.findIndex(t => t.id === s.travelId);
        if (s.fromIndex < 0) return;

        s.dragging = true;
        const card = s.card;
        const rect = card.getBoundingClientRect();
        card.classList.add('travel-reorder-source', 'travel-reorder-active');

        const floatEl = card.cloneNode(true);
        floatEl.classList.add('travel-reorder-float');
        floatEl.classList.remove('travel-reorder-source', 'travel-reorder-active');
        floatEl.setAttribute('aria-hidden', 'true');
        floatEl.style.pointerEvents = 'none';
        floatEl.style.width = `${rect.width}px`;
        floatEl.style.left = `${rect.left}px`;
        floatEl.style.top = `${rect.top}px`;
        document.body.appendChild(floatEl);
        s.floatEl = floatEl;
        s.offsetX = s.lastClientX - rect.left;
        s.offsetY = s.lastClientY - rect.top;

        lockPageScroll();
        try {
          s.handle.setPointerCapture(s.pointerId);
          s.handle.addEventListener('lostpointercapture', onHandleLostPointerCapture);
        } catch (err) { /* ignore */ }

        s.insertIndex = findInsertIndex(s.lastClientY, card);
        updateInsertIndicator(s.insertIndex);
        moveFloat(s.lastClientX, s.lastClientY);
        startEdgeScrollLoop();
      }

      function applyTravelReorder(fromIndex, insertIndex) {
        resetDragUI(null);
        const sorted = getSortedTravels();
        if (fromIndex < 0 || sorted.length < 2) return;
        if (insertIndex === fromIndex || insertIndex === fromIndex + 1) return;
        const next = sorted.slice();
        const [item] = next.splice(fromIndex, 1);
        if (insertIndex > fromIndex) insertIndex -= 1;
        next.splice(insertIndex, 0, item);
        next.forEach((t, i) => { t.order = i; });
        travels = next;
        saveTravels();
        renderHomePage();
        resetDragUI(null);
      }

      function detachMoveListener() {
        document.removeEventListener('pointermove', onDocumentPointerMove);
      }

      function attachMoveListener() {
        detachMoveListener();
        document.addEventListener('pointermove', onDocumentPointerMove, { passive: false });
      }

      function releaseHandlePointerCapture(handle, pointerId) {
        if (!handle || pointerId == null) return;
        try {
          if (handle.hasPointerCapture && handle.hasPointerCapture(pointerId)) {
            handle.releasePointerCapture(pointerId);
          }
        } catch (err) { /* ignore */ }
      }

      function attachEndListeners() {
        if (endListenersAttached) return;
        window.addEventListener('pointerup', onWindowPointerEnd, true);
        window.addEventListener('pointercancel', onWindowPointerEnd, true);
        window.addEventListener('touchend', onWindowTouchEnd, true);
        window.addEventListener('touchcancel', onWindowTouchEnd, true);
        endListenersAttached = true;
      }

      function detachEndListeners() {
        if (!endListenersAttached) return;
        window.removeEventListener('pointerup', onWindowPointerEnd, true);
        window.removeEventListener('pointercancel', onWindowPointerEnd, true);
        window.removeEventListener('touchend', onWindowTouchEnd, true);
        window.removeEventListener('touchcancel', onWindowTouchEnd, true);
        endListenersAttached = false;
      }

      function purgeDragArtifacts(activeSession) {
        document.querySelectorAll('.travel-reorder-float').forEach(el => el.remove());
        travelsContainer.querySelectorAll('.travel-card').forEach(card => {
          card.classList.remove('travel-reorder-source', 'travel-reorder-active');
        });
        if (activeSession && activeSession.floatEl && activeSession.floatEl.isConnected) {
          activeSession.floatEl.remove();
        }
        if (activeSession && activeSession.card) {
          activeSession.card.classList.remove('travel-reorder-source', 'travel-reorder-active');
        }
        if (insertIndicator) {
          insertIndicator.hidden = true;
          insertIndicator.style.display = 'none';
        }
      }

      function resetDragUI(activeSession) {
        stopEdgeScrollLoop();
        forceUnlockPageScroll();
        detachMoveListener();
        detachEndListeners();
        if (activeSession && activeSession.longPressTimer) {
          clearTimeout(activeSession.longPressTimer);
          activeSession.longPressTimer = null;
        }
        if (activeSession && activeSession.handle) {
          activeSession.handle.removeEventListener('lostpointercapture', onHandleLostPointerCapture);
          releaseHandlePointerCapture(activeSession.handle, activeSession.pointerId);
        }
        purgeDragArtifacts(activeSession);
      }

      function cleanup() {
        const active = session;
        session = null;
        resetDragUI(active);
      }

      function endSession() {
        if (!session || session.ending) return;
        session.ending = true;
        const wasDragging = session.dragging;
        const fromIndex = session.fromIndex;
        const insertIndex = session.insertIndex;
        cleanup();
        if (wasDragging) applyTravelReorder(fromIndex, insertIndex);
      }

      function cancelPending() {
        if (!session || session.dragging) return;
        endSession();
      }

      function pointerIdMatches(event) {
        if (!session || event.pointerId == null) return true;
        return event.pointerId === session.pointerId;
      }

      function onWindowPointerEnd(event) {
        if (!session || !pointerIdMatches(event)) return;
        endSession();
      }

      function onWindowTouchEnd() {
        if (!session || session.pointerType !== 'touch') return;
        endSession();
      }

      function onHandleLostPointerCapture() {
        if (!session || !session.dragging || session.ending) return;
        endSession();
      }

      function onDocumentPointerMove(event) {
        if (!session || event.pointerId !== session.pointerId) return;
        session.lastClientX = event.clientX;
        session.lastClientY = event.clientY;

        if (!session.dragging) {
          const dx = event.clientX - session.startX;
          const dy = event.clientY - session.startY;
          const distance = Math.hypot(dx, dy);
          if (session.pointerType === 'touch') {
            event.preventDefault();
            if (distance > TRAVEL_REORDER_MOVE_THRESHOLD && session.longPressTimer) {
              clearTimeout(session.longPressTimer);
              session.longPressTimer = null;
            }
            return;
          }
          if (distance >= TRAVEL_REORDER_MOVE_THRESHOLD) startDrag();
          return;
        }

        event.preventDefault();
        session.insertIndex = findInsertIndex(event.clientY, session.card);
        updateInsertIndicator(session.insertIndex);
        moveFloat(event.clientX, event.clientY);
      }

      function onHandlePointerDown(event) {
        if (getSortedTravels().length < 2) return;
        if (event.button !== 0 && event.pointerType === 'mouse') return;
        if (session) endSession();

        const handle = event.currentTarget;
        const card = handle.closest('.travel-card');
        if (!card) return;

        event.stopPropagation();
        session = {
          pointerId: event.pointerId,
          pointerType: event.pointerType,
          handle,
          card,
          travelId: card.dataset.travelId || '',
          startX: event.clientX,
          startY: event.clientY,
          lastClientX: event.clientX,
          lastClientY: event.clientY,
          fromIndex: -1,
          insertIndex: 0,
          dragging: false,
          ending: false,
          longPressTimer: null,
          floatEl: null,
          offsetX: 0,
          offsetY: 0
        };

        attachEndListeners();
        attachMoveListener();

        if (event.pointerType === 'touch') {
          session.longPressTimer = setTimeout(() => {
            if (session && !session.dragging && !session.ending) startDrag();
          }, TRAVEL_REORDER_LONG_PRESS_MS);
        }
      }

      function ensureInsertIndicator() {
        if (insertIndicator && insertIndicator.isConnected && insertIndicator.parentNode === travelsContainer) return;
        insertIndicator = document.createElement('div');
        insertIndicator.className = 'travel-insert-indicator';
        insertIndicator.hidden = true;
        insertIndicator.style.display = 'none';
        travelsContainer.appendChild(insertIndicator);
      }

      function bindHandles() {
        resetDragUI(null);
        ensureInsertIndicator();
        if (getSortedTravels().length < 2) {
          if (insertIndicator) {
            insertIndicator.hidden = true;
            insertIndicator.style.display = 'none';
          }
          return;
        }
        travelsContainer.querySelectorAll('.travel-card-drag-handle').forEach(handle => {
          handle.replaceWith(handle.cloneNode(true));
        });
        travelsContainer.querySelectorAll('.travel-card-drag-handle').forEach(handle => {
          handle.addEventListener('pointerdown', onHandlePointerDown);
        });
      }

      return { bindHandles, cancelPending, forceReset: () => resetDragUI(null) };
    })();

    backToHomeBtn.addEventListener('click', enterHome);
    travelSettingsBtn.addEventListener('click', openTravelSettingsModal);
    travelSettingsCancelBtn.addEventListener('click', closeTravelSettingsModal);
    travelSettingsModal.addEventListener('click', (event) => {
      if (event.target === travelSettingsModal) closeTravelSettingsModal();
    });
    travelSettingsCoverBtn.addEventListener('click', () => {
      const travelId = uiState.currentTravelId;
      closeTravelSettingsModal();
      if (travelId) enterChangeCover(travelId);
    });
    travelSettingsEditInfoBtn.addEventListener('click', () => {
      const travelId = uiState.currentTravelId;
      closeTravelSettingsModal();
      if (travelId) enterEditTravelInfo(travelId);
    });
    travelSettingsMembersBtn.addEventListener('click', () => {
      closeTravelSettingsModal();
      enterMemberManage();
    });
    travelSettingsDeleteBtn.addEventListener('click', () => {
      const travel = getCurrentTravel();
      closeTravelSettingsModal();
      if (travel) openTravelDeleteConfirm(travel);
    });

    travelCoverCancelBtn.addEventListener('click', closeTravelCoverModal);
    travelCoverModal.addEventListener('click', (event) => {
      if (event.target === travelCoverModal) closeTravelCoverModal();
    });
    travelCoverSystemBtn.addEventListener('click', closeTravelCoverModal);
    travelCoverUploadBtn.addEventListener('click', closeTravelCoverModal);

    backFromEditTravelInfoBtn.addEventListener('click', leaveEditTravelInfo);
    backFromChangeCoverBtn.addEventListener('click', leaveChangeCover);
    cancelChangeCoverBtn.addEventListener('click', leaveChangeCover);
    saveChangeCoverBtn.addEventListener('click', saveChangeCover);
    cancelEditTravelInfoBtn.addEventListener('click', (event) => {
      event.preventDefault();
      event.stopPropagation();
      leaveEditTravelInfo();
    });
    editTravelInfoNameInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') handleSaveTravelInfo(event);
    });
    bindTravelInfoDateField(
      editTravelInfoStartDateRow,
      editTravelInfoStartDateInput,
      editTravelInfoStartDatePicker
    );
    bindTravelInfoDateField(
      editTravelInfoEndDateRow,
      editTravelInfoEndDateInput,
      editTravelInfoEndDatePicker
    );
    loadTravels();
    addButton.hidden = true;
    renderHomePage();

  </script>

</body>
</html>
