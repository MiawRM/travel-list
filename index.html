    function loadMembers() {
      try {
        const raw = localStorage.getItem(MEMBERS_STORAGE_KEY);
        if (raw) {
          const parsed = JSON.parse(raw);
          if (Array.isArray(parsed) && parsed.length) {
            members = parsed.map(m => ({
              id: m.id || createId(),
              name: String(m.name || '').trim()
            })).filter(m => m.name);
            if (members.length) {
              saveMembers();
              return;
            }
          }
        }
      } catch (e) {
        members = [];
      }
      members = ['我', '小A', '小B'].map(name => ({ id: createId(), name }));
      saveMembers();
    }

    function renderMemberList() {
      memberList.innerHTML = '';
      members.forEach(m => {
        const chip = document.createElement('button');
        chip.type = 'button';
        chip.className = 'member-chip';
        chip.dataset.memberId = m.id;
        chip.setAttribute('aria-label', `${m.name}，点击查看待准备物品，长按更多操作`);
        chip.title = '点击查看待准备物品，长按更多操作';
        const av = document.createElement('div');
        av.className = 'member-avatar';
        av.style.background = colorForName(m.name);
        av.textContent = m.name.charAt(0) || '?';
        const nm = document.createElement('span');
        nm.className = 'member-chip-name';
        nm.textContent = m.name;
        chip.appendChild(av);
        chip.appendChild(nm);
        bindUiLongPress(chip, {
          onTap: () => openMemberPendingModal(m.id),
          onLongPress: () => openMemberActionModal(m.id)
        });
        memberList.appendChild(chip);
      });
      const addChip = document.createElement('button');
      addChip.type = 'button';
      addChip.className = 'member-chip member-add-chip';
      addChip.setAttribute('aria-label', '添加成员');
      const addAv = document.createElement('div');
      addAv.className = 'member-avatar';
      addAv.textContent = '＋';
      addChip.appendChild(addAv);
      addChip.addEventListener('click', (event) => {
        event.preventDefault();
        openAddMemberModal();
      });
      memberList.appendChild(addChip);
    }

    function removeMemberById(memberId) {
      const idx = members.findIndex(m => m.id === memberId);
      if (idx === -1) return;
      const removedName = members[idx].name;
      members.splice(idx, 1);
      checklistItems.forEach(item => {
        if (item.completedOwners) {
          item.completedOwners = item.completedOwners.filter(o => o !== removedName);
        }
        if (item.isAllMembers) {
          syncItemAllMembersOwners(item);
        } else if (item.owners && item.owners.length) {
          item.owners = item.owners.filter(o => o !== removedName);
        }
        item.completed = isItemAllOwnersComplete(item);
      });
      saveMembers();
      saveChecklistItems();
      renderMemberList();
      renderOwnerOptions();
      renderChecklistItems();
    }

    function isOwnerPendingForItem(item, ownerName) {
      const owners = item.owners || [];
      if (!owners.includes(ownerName)) return false;
      return !(item.completedOwners || []).includes(ownerName);
    }

    function getMemberPendingItems(memberName) {
      return checklistItems.filter(item => isOwnerPendingForItem(item, memberName));
    }

    function sortItemsByCategoryOrder(items) {
      const orderMap = new Map(categories.map((cat, index) => [cat, index]));
      return [...items].sort((a, b) => {
        const catA = orderMap.get(a.category) ?? 999;
        const catB = orderMap.get(b.category) ?? 999;
        if (catA !== catB) return catA - catB;
        return String(a.name).localeCompare(String(b.name), 'zh');
      });
    }

    function renderMemberPendingList(memberName) {
      const pending = sortItemsByCategoryOrder(getMemberPendingItems(memberName));
      memberPendingList.innerHTML = '';
      if (!pending.length) {
        memberPendingEmpty.hidden = false;
        return;
      }
      memberPendingEmpty.hidden = true;
      pending.forEach(item => {
        const li = document.createElement('li');
        li.className = 'member-pending-item';
        li.textContent = `☐ ${item.name}`;
        memberPendingList.appendChild(li);
      });
    }

    function openMemberPendingModal(memberId) {
      const member = members.find(m => m.id === memberId);
      if (!member) return;
      memberPendingTitle.textContent = `${member.name} 还没准备`;
      renderMemberPendingList(member.name);
      memberPendingModal.classList.add('show');
    }

    function closeMemberPendingModal() {
      memberPendingModal.classList.remove('show');
      memberPendingList.innerHTML = '';
      memberPendingEmpty.hidden = true;
    }

    function openMemberActionModal(memberId) {
      const member = members.find(m => m.id === memberId);
      if (!member) return;
      memberActionTargetId = memberId;
      memberActionTitle.textContent = member.name;
      memberActionModal.classList.add('show');
    }

    function closeMemberActionModal() {
      memberActionTargetId = null;
      memberActionModal.classList.remove('show');
    }

    function openEditMemberModal(memberId) {
      const member = members.find(m => m.id === memberId);
      if (!member) return;
      editingMemberId = memberId;
      editMemberNameInput.value = member.name;
      editMemberModal.classList.add('show');
      editMemberNameInput.focus();
      editMemberNameInput.select();
    }

    function closeEditMemberModal() {
      editMemberModal.classList.remove('show');
      editingMemberId = null;
    }

    function saveEditedMember() {
      if (!editingMemberId) return;
      const member = members.find(m => m.id === editingMemberId);
      if (!member) return;
      const nextName = editMemberNameInput.value.trim();
      if (!nextName) {
        editMemberNameInput.focus();
        return;
      }
      if (members.some(m => m.id !== editingMemberId && m.name === nextName)) {
        editMemberNameInput.select();
        return;
      }
      const oldName = member.name;
      if (oldName !== nextName) {
        member.name = nextName;
        checklistItems.forEach(item => {
          if (item.completedOwners) {
            item.completedOwners = item.completedOwners.map(o => (o === oldName ? nextName : o));
          }
          if (item.isAllMembers) {
            syncItemAllMembersOwners(item);
          } else if (item.owners && item.owners.length) {
            item.owners = item.owners.map(o => (o === oldName ? nextName : o));
          }
          item.completed = isItemAllOwnersComplete(item);
        });
        saveMembers();
        saveChecklistItems();
        renderMemberList();
        renderOwnerOptions();
        renderChecklistItems();
      }
      closeEditMemberModal();
    }

    function getAllMemberNames() {
      return members.map(m => m.name).filter(Boolean);
    }

    function ownersMatchAllMembers(owners) {
      const allNames = getAllMemberNames();
      if (!allNames.length || !owners || !owners.length) return false;
      if (owners.length !== allNames.length) return false;
      const set = new Set(owners);
      return allNames.every(name => set.has(name));
    }

    function syncItemAllMembersOwners(item) {
      if (!item.isAllMembers) return;
      item.owners = getAllMemberNames();
      if (!Array.isArray(item.completedOwners)) item.completedOwners = [];
      item.completedOwners = item.completedOwners.filter(name => item.owners.includes(name));
      item.completed = isItemAllOwnersComplete(item);
    }

    function syncAllMembersItems() {
      checklistItems.forEach(syncItemAllMembersOwners);
    }

    function normalizeItemAllMembers(item) {
      if (item.isAllMembers === true) {
        syncItemAllMembersOwners(item);
        return;
      }
      if (item.isAllMembers !== false && ownersMatchAllMembers(item.owners)) {
        item.isAllMembers = true;
        syncItemAllMembersOwners(item);
      }
    }

    function readOwnersFromContainer(container) {
      const allCb = container.querySelector('.owner-all-checkbox');
      const isAllMembers = !!(allCb && allCb.checked);
      const owners = isAllMembers
        ? getAllMemberNames()
        : Array.from(container.querySelectorAll('input[name="owners"]:checked'))
          .map(checkbox => checkbox.value);
      return { owners, isAllMembers };
    }

    function syncOwnerAllCheckboxState(container) {
      const allCb = container.querySelector('.owner-all-checkbox');
      if (!allCb) return;
      const memberBoxes = container.querySelectorAll('input[name="owners"]');
      if (!memberBoxes.length) {
        allCb.checked = false;
        return;
      }
      allCb.checked = [...memberBoxes].every(cb => cb.checked);
    }

    function renderOwnerCheckboxes(container, options = {}) {
      const {
        selectedOwners = [],
        isAllMembers = false,
        selectFirstByDefault = false
      } = options;
      container.innerHTML = '';
      if (!members.length) {
        const hint = document.createElement('div');
        hint.className = 'member-empty';
        hint.textContent = '请先添加成员';
        container.appendChild(hint);
        return;
      }
      const allLabel = document.createElement('label');
      allLabel.className = 'owner-chip owner-chip-all';
      const allInput = document.createElement('input');
      allInput.type = 'checkbox';
      allInput.className = 'owner-all-checkbox';
      allInput.setAttribute('aria-label', '全部人');
      const allMini = document.createElement('span');
      allMini.className = 'owner-chip-avatar';
      allMini.textContent = '👨‍👩‍👧';
      const allNameSpan = document.createElement('span');
      allNameSpan.textContent = '全部人';
      allLabel.appendChild(allInput);
      allLabel.appendChild(allMini);
      allLabel.appendChild(allNameSpan);
      container.appendChild(allLabel);

      members.forEach((m, index) => {
        const label = document.createElement('label');
        label.className = 'owner-chip';
        const input = document.createElement('input');
        input.type = 'checkbox';
        input.name = 'owners';
        input.value = m.name;
        input.checked = isAllMembers
          || selectedOwners.includes(m.name)
          || (selectFirstByDefault && selectedOwners.length === 0 && !isAllMembers && index === 0);
        const mini = document.createElement('span');
        mini.className = 'owner-chip-avatar';
        mini.style.background = colorForName(m.name);
        mini.textContent = m.name.charAt(0) || '?';
        const nameSpan = document.createElement('span');
        nameSpan.textContent = m.name;
        label.appendChild(input);
        label.appendChild(mini);
        label.appendChild(nameSpan);
        container.appendChild(label);
      });
      if (isAllMembers) {
        allInput.checked = true;
        container.querySelectorAll('input[name="owners"]').forEach(cb => {
          cb.checked = true;
        });
      } else {
        syncOwnerAllCheckboxState(container);
      }
    }

    function renderOwnerOptions() {
      renderOwnerCheckboxes(ownerOptions, { selectFirstByDefault: true });
    }

    function openAddMemberModal() {
      addMemberModal.classList.add('show');
      addMemberNameInput.value = '';
      addMemberNameInput.focus();
    }

    function closeAddMemberModal() {
      addMemberModal.classList.remove('show');
    }

    function addMember() {
      const name = addMemberNameInput.value.trim();
      if (!name) {
        addMemberNameInput.focus();
        return;
      }
      if (members.some(m => m.name === name)) {
        addMemberNameInput.select();
        return;
      }
      members.push({ id: createId(), name });
      saveMembers();
      syncAllMembersItems();
      saveChecklistItems();
      renderMemberList();
      renderOwnerOptions();
      renderChecklistItems();
      closeAddMemberModal();
    }

    cancelAddMemberBtn.addEventListener('click', closeAddMemberModal);
    saveAddMemberBtn.addEventListener('click', addMember);
    addMemberNameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addMember();
    });
    addMemberModal.addEventListener('click', (event) => {
      if (event.target === addMemberModal) closeAddMemberModal();
    });

    closeMemberPendingBtn.addEventListener('click', closeMemberPendingModal);
    memberPendingModal.addEventListener('click', (event) => {
      if (event.target === memberPendingModal) closeMemberPendingModal();
    });
    cancelMemberActionBtn.addEventListener('click', closeMemberActionModal);
    memberActionModal.addEventListener('click', (event) => {
      if (event.target === memberActionModal) closeMemberActionModal();
    });
    memberActionEditBtn.addEventListener('click', () => {
      const memberId = memberActionTargetId;
      closeMemberActionModal();
      if (memberId) openEditMemberModal(memberId);
    });
    memberActionDeleteBtn.addEventListener('click', () => {
      const memberId = memberActionTargetId;
      closeMemberActionModal();
      if (memberId) openConfirmDeleteMember(memberId);
    });

    cancelEditMemberBtn.addEventListener('click', closeEditMemberModal);
    saveEditMemberBtn.addEventListener('click', saveEditedMember);
    editMemberNameInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') saveEditedMember();
    });
    editMemberModal.addEventListener('click', (event) => {
      if (event.target === editMemberModal) closeEditMemberModal();
    });

    function openCategoryModal() {
      categoryModal.classList.add('show');
      newCategoryNameInput.value = '';
      newCategoryNameInput.focus();
    }

    function closeCategoryModal() {
      categoryModal.classList.remove('show');
    }

    function confirmAddCategory() {
      const name = newCategoryNameInput.value.trim();
      if (!name) {
        newCategoryNameInput.focus();
        return;
      }
      if (categories.includes(name)) {
        newCategoryNameInput.select();
        return;
      }
      categories.push(name);
      saveCategories();
      renderCategoryCards();
      syncCategorySelect(name);
      renderChecklistItems();
      closeCategoryModal();
    }

    addCategoryOpenBtn.addEventListener('click', openCategoryModal);
    cancelCategoryBtn.addEventListener('click', closeCategoryModal);
    confirmCategoryBtn.addEventListener('click', confirmAddCategory);
    newCategoryNameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') confirmAddCategory();
    });
    categoryModal.addEventListener('click', (event) => {
      if (event.target === categoryModal) closeCategoryModal();
    });

    categoriesContainer.addEventListener('keydown', (event) => {
      if (event.key !== 'Enter' && event.key !== ' ') return;
      const nameEl = event.target.closest('.category-name');
      if (!nameEl) return;
      event.preventDefault();
      toggleCategoryCollapse(nameEl.dataset.categoryName);
    });

    cancelCategoryActionBtn.addEventListener('click', closeCategoryActionModal);
    categoryActionModal.addEventListener('click', (event) => {
      if (event.target === categoryActionModal) closeCategoryActionModal();
    });
    categoryActionRenameBtn.addEventListener('click', () => {
      const catName = categoryActionTargetName;
      closeCategoryActionModal();
      if (catName) openEditCategoryModal(catName);
    });
    categoryActionDeleteBtn.addEventListener('click', () => {
      const catName = categoryActionTargetName;
      closeCategoryActionModal();
      if (!catName || categories.length <= 1) return;
      openConfirmDelete(() => removeCategoryByName(catName));
    });

    function openInviteJoinModal() {
      inviteJoinModal.classList.add('show');
    }

    function closeInviteJoinModal() {
      inviteJoinModal.classList.remove('show');
    }

    function openModal(categoryName = null) {
      addItemTargetCategory = categoryName || null;
      categorySelectGroup.hidden = !!categoryName;
      if (addItemModalTitle) {
        addItemModalTitle.textContent = formatAddItemModalTitle(categoryName);
      }
      modal.classList.add('show');
      itemNameInput.value = '';
      if (categoryName) {
        syncCategorySelect(categoryName);
      } else {
        syncCategorySelect(categories.length ? categories[0] : '');
      }
      renderOwnerOptions();
      itemNameInput.focus();
    }

    function closeModal() {
      addItemTargetCategory = null;
      categorySelectGroup.hidden = false;
      if (addItemModalTitle) {
        addItemModalTitle.textContent = '添加新物品';
      }
      modal.classList.remove('show');
    }

    function openEditOwnersModal(itemId) {
      const item = checklistItems.find(entry => entry.id === itemId);
      if (!item) return;
      editingItemId = itemId;
      editItemNameInput.value = item.name;
      editOwnersItemLabel.textContent = '负责人（可多选）';
      renderOwnerCheckboxes(editOwnerOptions, {
        selectedOwners: item.owners || [],
        isAllMembers: !!item.isAllMembers
      });
      editOwnersModal.classList.add('show');
      editItemNameInput.focus();
    }

    function closeEditOwnersModal() {
      editOwnersModal.classList.remove('show');
      editingItemId = null;
    }

    function saveEditedOwners() {
      if (!editingItemId) return;
      const item = checklistItems.find(entry => entry.id === editingItemId);
      if (!item) return;
      const nextName = editItemNameInput.value.trim();
      if (!nextName) {
        editItemNameInput.focus();
        return;
      }
      item.name = nextName;
      const { owners, isAllMembers } = readOwnersFromContainer(editOwnerOptions);
      item.isAllMembers = isAllMembers;
      item.owners = owners;
      item.completedOwners = (item.completedOwners || []).filter(name => item.owners.includes(name));
      item.completed = isItemAllOwnersComplete(item);
      saveChecklistItems();
      renderChecklistItems();
      closeEditOwnersModal();
    }

    function getPendingOwners(item) {
      const done = new Set(item.completedOwners || []);
      return (item.owners || []).filter(name => !done.has(name));
    }

    function isItemAllOwnersComplete(item) {
      const owners = item.owners || [];
      if (!owners.length) return !!item.completed;
      const done = new Set(item.completedOwners || []);
      return owners.every(name => done.has(name));
    }

    function normalizeItemCompletion(item) {
      normalizeItemAllMembers(item);
      if (!Array.isArray(item.owners)) item.owners = [];
      if (!Array.isArray(item.completedOwners)) item.completedOwners = [];
      item.completedOwners = item.completedOwners.filter(name => item.owners.includes(name));
      if (item.completed && item.owners.length && !item.completedOwners.length) {
        item.completedOwners = [...item.owners];
      }
      item.completed = isItemAllOwnersComplete(item);
    }

    function toggleOwnerCompletion(item, ownerName) {
      if (!(item.owners || []).includes(ownerName)) return;
      if (!item.completedOwners) item.completedOwners = [];
      const idx = item.completedOwners.indexOf(ownerName);
      if (idx === -1) item.completedOwners.push(ownerName);
      else item.completedOwners.splice(idx, 1);
      item.completed = isItemAllOwnersComplete(item);
    }

    function createItemElement(itemData) {
      const item = document.createElement('div');
      item.className = 'item';
      item.dataset.itemId = itemData.id;

      normalizeItemCompletion(itemData);

      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.checked = isItemAllOwnersComplete(itemData);

      const name = document.createElement('span');
      name.className = 'item-name';
      name.textContent = itemData.name;

      const avatars = document.createElement('div');
      avatars.className = 'avatars';
      const pendingOwners = getPendingOwners(itemData);
      const maxVisible = 3;
      pendingOwners.slice(0, maxVisible).forEach(ownerName => {
        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        avatar.dataset.ownerName = ownerName;
        avatar.style.background = colorForName(ownerName);
        avatar.textContent = (ownerName || '').charAt(0) || '?';
        avatar.title = `${ownerName}（点击标记完成）`;
        avatar.setAttribute('role', 'button');
        avatar.setAttribute('tabindex', '0');
        avatar.setAttribute('aria-label', `${ownerName} 标记完成`);
        avatars.appendChild(avatar);
      });
      const extraCount = pendingOwners.length - maxVisible;
      if (extraCount > 0) {
        const more = document.createElement('div');
        more.className = 'avatar avatar-more';
        more.textContent = `+${extraCount}`;
        more.title = pendingOwners.slice(maxVisible).join('、');
        avatars.appendChild(more);
      }

      const deleteButton = document.createElement('button');
      deleteButton.className = 'item-delete';
      deleteButton.type = 'button';
      deleteButton.setAttribute('aria-label', '删除物品');
      deleteButton.textContent = '×';

      item.appendChild(checkbox);
      item.appendChild(name);
      item.appendChild(avatars);
      item.appendChild(deleteButton);
      item.classList.toggle('completed', isItemAllOwnersComplete(itemData));
      return item;
    }

    function renderChecklistItems() {
      Object.values(categoryCards).forEach(card => {
        card.querySelectorAll('.item').forEach(el => el.remove());
      });

      checklistItems.forEach(itemData => {
        const card = categoryCards[itemData.category];
        if (!card) return;
        card.appendChild(createItemElement(itemData));
      });
      updateAllCategoryProgressDisplays();
    }

    function loadChecklistItems() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          const parsed = JSON.parse(saved);
          if (Array.isArray(parsed) && parsed.length) {
            checklistItems = parsed;
            checklistItems.forEach(normalizeItemCompletion);
            mergeCategoriesFromItems();
            return;
          }
          if (Array.isArray(parsed)) {
            checklistItems = [];
            mergeCategoriesFromItems();
            return;
          }
        }
      } catch (error) {
        checklistItems = [];
      }

      checklistItems = getDefaultSeedItems();
      mergeCategoriesFromItems();
      saveChecklistItems();
    }

    function addItemToCategory() {
      const name = itemNameInput.value.trim();
      const category = addItemTargetCategory || categorySelect.value;
      const { owners, isAllMembers } = readOwnersFromContainer(ownerOptions);

      if (!name) {
        itemNameInput.focus();
        return;
      }
      if (!owners.length) return;

      const card = categoryCards[category];
      if (!card) return;

      checklistItems.push({
        id: createId(),
        name,
        category,
        owners,
        isAllMembers,
        completedOwners: [],
        completed: false
      });
      saveChecklistItems();
      renderChecklistItems();
      closeModal();
    }

    cancelDeleteBtn.addEventListener('click', closeConfirmDelete);
    confirmDeleteBtn.addEventListener('click', executeConfirmDelete);
    confirmDeleteModal.addEventListener('click', (event) => {
      if (event.target === confirmDeleteModal) closeConfirmDelete();
    });

    addButton.addEventListener('click', openInviteJoinModal);
    closeInviteJoinBtn.addEventListener('click', closeInviteJoinModal);
    inviteJoinModal.addEventListener('click', (event) => {
      if (event.target === inviteJoinModal) closeInviteJoinModal();
    });
    cancelAddBtn.addEventListener('click', closeModal);
    confirmAddBtn.addEventListener('click', addItemToCategory);
    cancelEditOwnersBtn.addEventListener('click', closeEditOwnersModal);
    saveEditOwnersBtn.addEventListener('click', saveEditedOwners);

    itemNameInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') addItemToCategory();
    });

    modal.addEventListener('click', (event) => {
      if (event.target === modal) closeModal();
    });

    editOwnersModal.addEventListener('click', (event) => {
      if (event.target === editOwnersModal) closeEditOwnersModal();
    });

    editItemNameInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') saveEditedOwners();
    });

    document.addEventListener('change', (event) => {
      if (event.target.matches('.item input[type="checkbox"]')) {
        const item = event.target.closest('.item');
        if (!item) return;

        item.classList.toggle('completed', event.target.checked);
        const itemId = item.dataset.itemId;
        const targetItem = checklistItems.find(entry => entry.id === itemId);
        if (!targetItem) return;

        if (event.target.checked) {
          targetItem.completedOwners = [...(targetItem.owners || [])];
        } else {
          targetItem.completedOwners = [];
        }
        targetItem.completed = event.target.checked;
        saveChecklistItems();
        renderChecklistItems();
        return;
      }
      if (event.target.matches('.owner-all-checkbox')) {
        const container = event.target.closest('.owner-options');
        if (!container) return;
        const checked = event.target.checked;
        container.querySelectorAll('input[name="owners"]').forEach(cb => {
          cb.checked = checked;
        });
        return;
      }
      if (event.target.matches('input[name="owners"]')) {
        const container = event.target.closest('.owner-options');
        if (container) syncOwnerAllCheckboxState(container);
      }
    });

    document.addEventListener('click', (event) => {
      const deleteBtn = event.target.closest('.item-delete');
      if (!deleteBtn) return;

      const item = deleteBtn.closest('.item');
      if (!item) return;

      const itemId = item.dataset.itemId;
      openConfirmDelete(() => removeItemById(itemId));
    });

    document.addEventListener('click', (event) => {
      const avatar = event.target.closest('.avatars .avatar:not(.avatar-more)');
      if (avatar) {
        event.stopPropagation();
        const item = avatar.closest('.item');
        if (!item) return;
        const ownerName = avatar.dataset.ownerName;
        if (!ownerName) return;
        const targetItem = checklistItems.find(entry => entry.id === item.dataset.itemId);
        if (!targetItem) return;
        toggleOwnerCompletion(targetItem, ownerName);
        saveChecklistItems();
        renderChecklistItems();
        return;
      }

      const itemName = event.target.closest('.item-name');
      if (!itemName) return;
      const item = itemName.closest('.item');
      if (!item) return;
      openEditOwnersModal(item.dataset.itemId);
    });

    bindUiLongPress(tripTitleEl, {
      onLongPress: openEditTripTitleModal
    });
    tripTitleEl.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' || event.key === ' ') {
        event.preventDefault();
        openEditTripTitleModal();
      }
    });
    cancelEditTripTitleBtn.addEventListener('click', closeEditTripTitleModal);
    saveEditTripTitleBtn.addEventListener('click', saveEditedTripTitle);
    editTripTitleInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') saveEditedTripTitle();
    });
    editTripTitleModal.addEventListener('click', (event) => {
      if (event.target === editTripTitleModal) closeEditTripTitleModal();
    });

    bindUiLongPress(membersSectionTitleEl, {
      onLongPress: openEditMembersSectionTitleModal
    });
    membersSectionTitleEl.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' || event.key === ' ') {
        event.preventDefault();
        openEditMembersSectionTitleModal();
      }
    });
    cancelEditMembersSectionTitleBtn.addEventListener('click', closeEditMembersSectionTitleModal);
    saveEditMembersSectionTitleBtn.addEventListener('click', saveEditedMembersSectionTitle);
    editMembersSectionTitleInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') saveEditedMembersSectionTitle();
    });
    editMembersSectionTitleModal.addEventListener('click', (event) => {
      if (event.target === editMembersSectionTitleModal) closeEditMembersSectionTitleModal();
    });

    cancelEditCategoryBtn.addEventListener('click', closeEditCategoryModal);
    saveEditCategoryBtn.addEventListener('click', saveEditedCategory);
    editCategoryNameInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') saveEditedCategory();
    });
    editCategoryModal.addEventListener('click', (event) => {
      if (event.target === editCategoryModal) closeEditCategoryModal();
    });

    loadMembers();
    loadTripTitle();
    renderTripTitle();
    loadMembersSectionTitle();
    renderMembersSectionTitle();
    renderMemberList();
    loadCategories();
    loadCategoryCollapseState();
    renderCategoryCards();
    loadChecklistItems();
    if (mergeCategoriesFromItems()) {
      renderCategoryCards();
    }
    syncCategorySelect();
    renderOwnerOptions();
    renderChecklistItems();

  </script>

</body>
</html>
